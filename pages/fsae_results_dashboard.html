    </aside>

</div>
<script src="fsae_school_canonicalization.js"></script>
<script>
let RAW_DATA=[], DATA=[], METRICS=[], metricMap={}, omitted=new Set(), sortCol='total_score_clean', sortDir='desc', competitionColors={}, tableState={cols:[],data:[],rowH:31}, ready=false;
const competitionPalette=['#38bdf8','#f97316','#22c55e','#e879f9','#f43f5e','#a3e635','#8b5cf6','#facc15'];
const integerKeys=new Set(['rank','rank_by_y','year','car_num','engine_cylinders','num_motors']);
const DIST_KEY='__y_distribution';
const TIME_KEY='__school_time';
const COMP_TIME_KEY='__competition_time';
const $=id=>document.getElementById(id);
const toNum=v=>v===null||v===undefined||v===''?NaN:+v;
const hasNum=v=>Number.isFinite(toNum(v));
const num=v=>Number.isFinite(toNum(v))?toNum(v):0;
const rowKey=r=>r.entry_id || [r.competition,r.year,r.vehicle_type,r.car_num,r.team].join('|');
function metricLabel(k){return metricMap[k]?.label||k}
function isIntegerKey(k){return integerKeys.has(k)||metricMap[k]?.integer===true}
function fmt(v,k){if(v===null||v===undefined||v==='')return ''; let n=+v; if(!Number.isFinite(n))return String(v); if(isIntegerKey(k))return String(Math.round(n)); return Math.abs(n)>=100? n.toFixed(1): n.toFixed(2).replace(/\.00$/,'')}
function zeroNullKey(k){return $('zeroAsNull')?.checked&&metricMap[k]&&k!=='year'&&k!=='car_num'&&k!=='rank_by_y'&&k!=='rank'}
function valueOf(r,k){let v=r[k]; return zeroNullKey(k)&&hasNum(v)&&toNum(v)===0?null:v}
function hasMetricNum(r,k){return hasNum(valueOf(r,k))}
function metricNum(r,k){return toNum(valueOf(r,k))}
function isCompetitionMetric(k){return metricMap[k]?.group==='Competition'}
async function load(){const res=await fetch('../data/fsae_dashboard_data.json'); const p=await res.json(); RAW_DATA=p.rows; DATA=RAW_DATA.map(cleanRowStrings); METRICS=p.metrics; metricMap=Object.fromEntries(METRICS.map(m=>[m.key,m])); initControls(); render(); ready=true;}
function cleanRowStrings(r){return {...r,team:cleanTeamName(r.team),team_normalized:cleanTeamName(r.team_normalized)}}
function groupedOptions(select, includeRank=false, includeNone=false){select.innerHTML=''; if(includeNone){let o=document.createElement('option');o.value='';o.textContent='None';select.appendChild(o)} if(includeRank){let og=document.createElement('optgroup'); og.label='Special'; [['rank_by_y','Y-Metric Rank'],[DIST_KEY,'Y-Metric Distribution'],[TIME_KEY,'School Timeseries'],[COMP_TIME_KEY,'Competition Timeseries']].forEach(([v,t])=>{let o=document.createElement('option'); o.value=v; o.textContent=t; og.appendChild(o)}); select.appendChild(og)} let groups={}; METRICS.forEach(m=>{if(m.key==='rank_by_y')return; (groups[m.group]??=[]).push(m)}); Object.entries(groups).sort(([a],[b])=>a==='Competition'?1:b==='Competition'?-1:0).forEach(([g,ms])=>{let og=document.createElement('optgroup');og.label=g; ms.forEach(m=>{let o=document.createElement('option');o.value=m.key;o.textContent=m.label;og.appendChild(o)}); select.appendChild(og)});}
function preferredMetric(keys){return keys.find(k=>metricMap[k]) || METRICS.find(m=>m.key!=='rank_by_y')?.key || ''}
function initControls(){
  groupedOptions($('xMetric'),true); groupedOptions($('yMetric'),false); groupedOptions($('sizeMetric'),false,true);
  $('xMetric').value=preferredMetric(['endurance_efficiency_score','endurance_score','overall_place']); $('yMetric').value=preferredMetric(['total_score_clean','total_score','overall_place']);
  const comps=[...new Set(DATA.map(r=>r.competition))].sort(); const years=[...new Set(DATA.map(r=>+r.year))].sort((a,b)=>a-b);
  competitionColors=Object.fromEntries(comps.map((c,i)=>[c,i]));
  $('competitionChecks').innerHTML=comps.map(c=>`<label><input type="checkbox" class="comp" value="${esc(c)}" checked> ${esc(c)}</label>`).join('');
  $('yearChecks').innerHTML=years.map(y=>`<label><input type="checkbox" class="yr" value="${y}" checked> ${y}</label>`).join('');
  populateSchoolSelect();
  document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',render));
  $('tableWrap').addEventListener('scroll',scheduleTableRender,{passive:true});
  $('allYears').onclick=()=>{document.querySelectorAll('.yr').forEach(x=>x.checked=true);render()}; $('noYears').onclick=()=>{document.querySelectorAll('.yr').forEach(x=>x.checked=false);render()};
  $('allComps').onclick=()=>{document.querySelectorAll('.comp').forEach(x=>x.checked=true);render()}; $('noComps').onclick=()=>{document.querySelectorAll('.comp').forEach(x=>x.checked=false);render()};
  $('cleanNames').onchange=applyNameMode;
  $('darkTheme').onchange=toggleTheme;
  $('downloadRawSchools').onclick=downloadRawSchools;
  applyTheme(localStorage.getItem('fsaeTheme')||'dark');
  initPanelSizes();
  observeChartSize();
  splitters();
}
function observeChartSize(){if('ResizeObserver' in window)new ResizeObserver(()=>{if(ready)schedulePlotRedraw()}).observe($('chartWrap'))}
function initPanelSizes(){let rows=$('rowsPanel'); rows.style.width=rows.getBoundingClientRect().width+'px'; rows.style.flexBasis=rows.style.width;}
function applyNameMode(){DATA=$('cleanNames').checked?RAW_DATA.map(cleanRowStrings):RAW_DATA.map(r=>({...r})); populateSchoolSelect(); render();}
function populateSchoolSelect(){let teams=[...new Set(DATA.map(r=>String(r.team||'')).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); $('schoolTimeSelect').innerHTML=teams.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');}
function downloadRawSchools(){let schools=[...new Set(RAW_DATA.map(r=>String(r.team||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); let text=schools.join('\n')+'\n'; let blob=new Blob([text],{type:'text/plain;charset=utf-8'}); let url=URL.createObjectURL(blob); let a=document.createElement('a'); a.href=url; a.download='fsae_raw_school_names.txt'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function checked(cls){return new Set([...document.querySelectorAll('.'+cls+':checked')].map(x=>x.value))}
function applyTheme(theme){document.body.classList.toggle('light',theme==='light'); $('darkTheme').checked=theme!=='light';}
function toggleTheme(){let theme=$('darkTheme').checked?'dark':'light'; localStorage.setItem('fsaeTheme',theme); applyTheme(theme); render();}
function checkedCompetitions(){return [...checked('comp')].sort()}
function competitionColor(comp){let i=competitionColors[comp]??0; return competitionPalette[i%competitionPalette.length];}
function filtered(){const comps=checked('comp'), yrs=checked('yr'), q=$('teamSearch').value.toLowerCase().trim(); const x=$('xMetric').value,y=$('yMetric').value,school=$('schoolTimeSelect')?.value||''; return DATA.filter(r=>comps.has(String(r.competition))&&yrs.has(String(r.year))&&(x===TIME_KEY?String(r.team)===school:(x===COMP_TIME_KEY||!q||String(r.team).toLowerCase().includes(q)))&&!omitted.has(rowKey(r))&&(!$('hideZeroWeight').checked || [r.weight_reported_kg,r.weight_complete_vehicle_kg,r.weight_with_accumulator_kg,r.weight_without_accumulator_kg].some(v=>hasNum(v)&&toNum(v)>0))).filter(r=>!$('omitBothZero').checked || x==='rank_by_y' || x===DIST_KEY || x===TIME_KEY || x===COMP_TIME_KEY || !([x,y].every(k=>hasMetricNum(r,k)&&metricNum(r,k)===0)));}
function rankRows(rows,y,includeMissing=false){const dir=metricMap[y]?.direction||'descending'; let ranked=rows.filter(r=>hasMetricNum(r,y)).sort((a,b)=>dir==='ascending'?metricNum(a,y)-metricNum(b,y):metricNum(b,y)-metricNum(a,y)).map((r,i)=>({...r,__rank:i+1,__x:i+1,__y:metricNum(r,y)})); if(!includeMissing)return ranked; let missing=rows.filter(r=>!hasMetricNum(r,y)).map(r=>({...r,__rank:'',__x:null,__y:null})); return ranked.concat(missing);}
function extent(vals,key){const m=metricMap[key]||{}; if(m.fixed_min!==null&&m.fixed_min!==undefined&&m.fixed_max!==null&&m.fixed_max!==undefined)return [m.fixed_min,m.fixed_max]; let mn=Math.min(...vals),mx=Math.max(...vals); if(!Number.isFinite(mn)||!Number.isFinite(mx))return [0,1]; if(mn===mx){mn-=1;mx+=1} let pad=(mx-mn)*.07; return [Math.max(0,mn-pad),mx+pad];}
function competitionRows(rows){let seen=new Set(); return rows.filter(r=>{let k=[r.competition,r.year,r.vehicle_type].join('|'); if(seen.has(k))return false; seen.add(k); return true}).map(r=>({...r,team:`${r.competition} ${fmt(r.year,'year')} ${r.vehicle_type||''}`.trim(),__competitionRow:true}))}
function plotRows(rows,x,y,s=''){if(x===COMP_TIME_KEY||isCompetitionMetric(x)||isCompetitionMetric(y)||isCompetitionMetric(s))rows=competitionRows(rows); if(x===DIST_KEY)return rows.filter(r=>hasMetricNum(r,y)).map(r=>({...r,__y:metricNum(r,y)})); if(x===TIME_KEY||x===COMP_TIME_KEY)return rows.filter(r=>hasNum(r.year)&&hasMetricNum(r,y)).map(r=>({...r,__x:toNum(r.year),__y:metricNum(r,y)})); return x==='rank_by_y'?rankRows(rows,y):rows.filter(r=>hasMetricNum(r,x)&&hasMetricNum(r,y)).map(r=>({...r,__x:metricNum(r,x),__y:metricNum(r,y)}));}
function render(){let x=$('xMetric').value,y=$('yMetric').value,s=$('sizeMetric').value; updateModeControls(x); let rows=filtered(); let plotted=plotRows(rows,x,y,s); draw(plotted,x,y,s); table(rows,x,y); let yrs=[...new Set(rows.map(r=>r.year))].sort((a,b)=>a-b); let comps=[...new Set(rows.map(r=>r.competition))].sort(); $('countPill').textContent=`${plotted.length} plotted / ${rows.length} rows`; $('yearsPill').textContent=`Years: ${yrs.map(v=>fmt(v,'year')).join(', ')||'none'}`; $('compsPill').textContent=`Competitions: ${comps.join(', ')||'none'}`; renderLegend(comps);}
function updateModeControls(x){$('schoolTimeControl').classList.toggle('active',x===TIME_KEY);}
function renderLegend(comps){$('legend').innerHTML=comps.map(c=>`<span><i class="sw" style="background:${competitionColor(c)}"></i>${esc(c)}</span>`).join('');}
function chartMargins(W){return W<560?{l:56,r:12,t:22,b:54}:{l:90,r:22,t:24,b:62}}
function addWatermark(svg,W,H){const m=chartMargins(W),fs=W<560?30:36,txt='opendyna.com',tw=txt.length*fs*.62,th=fs+10,p=Math.max(24,fs*.9),a={x:m.l,y:m.t,w:W-m.l-m.r,h:H-m.t-m.b}; let candidates=[{x:a.x+p,y:a.y+p+fs},{x:a.x+a.w-p-tw,y:a.y+p+fs},{x:a.x+p,y:a.y+a.h-p},{x:a.x+a.w-p-tw,y:a.y+a.h-p}].map(c=>({...c,r:{x:c.x,y:c.y-fs,w:tw,h:th}})); let marks=[...svg.querySelectorAll('.pt')],score=c=>marks.reduce((s,e)=>{if(e.tagName==='circle'){let x=+e.getAttribute('cx'),y=+e.getAttribute('cy'),r=(+e.getAttribute('r')||4)+4; return s+(x+r>c.r.x&&x-r<c.r.x+c.r.w&&y+r>c.r.y&&y-r<c.r.y+c.r.h?25:0)} if(e.tagName==='rect'){let x=+e.getAttribute('x'),y=+e.getAttribute('y'),w=+e.getAttribute('width'),h=+e.getAttribute('height'),ox=Math.max(0,Math.min(x+w,c.r.x+c.r.w)-Math.max(x,c.r.x)),oy=Math.max(0,Math.min(y+h,c.r.y+c.r.h)-Math.max(y,c.r.y)); return s+ox*oy/80} return s},0); candidates.sort((a,b)=>score(a)-score(b)); let c=candidates[0],t=document.createElementNS('http://www.w3.org/2000/svg','text'); t.setAttribute('x',c.x); t.setAttribute('y',c.y); t.setAttribute('class','watermark'); t.textContent=txt; svg.appendChild(t)}
function draw(rows,x,y,s){const svg=$('chart'),wrap=$('chartWrap'),tip=$('tip'); const W=wrap.clientWidth,H=wrap.clientHeight; svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.innerHTML=''; if(W<120||H<120)return; if(x===DIST_KEY){drawDistribution(rows,y,W,H,svg,tip);return} if(x===TIME_KEY||x===COMP_TIME_KEY){drawTimeSeries(rows,y,W,H,svg,tip);return} const margin=chartMargins(W); const panels=$('splitMode').checked?['All']:[...new Set(rows.map(r=>r.competition))].sort(); const pw=(W-margin.l-margin.r)/Math.max(1,panels.length); rows.sort((a,b)=>String(a.competition).localeCompare(String(b.competition)));
 panels.forEach((p,pi)=>{let pr= p==='All'?rows:rows.filter(r=>r.competition===p); let xvals=pr.map(r=>r.__x), yvals=pr.map(r=>r.__y); let xKey=x==='rank_by_y'?'rank':x; let xr=x==='rank_by_y'?[0,Math.max(1,pr.length+1)]:extent(xvals,x), yr=extent(yvals,y); const x0=margin.l+pi*pw, y0=margin.t, w=Math.max(1,pw-12), h=Math.max(1,H-margin.t-margin.b); const sx=v=>x0+(v-xr[0])/(xr[1]-xr[0])*w; const sy=v=>y0+h-(v-yr[0])/(yr[1]-yr[0])*h; tickValues(xr,xKey).forEach(v=>{let xx=sx(v); line(xx,y0,xx,y0+h,'grid'); text(xx,y0+h+20,fmt(v,xKey),'tick','middle')}); tickValues(yr,y).forEach(v=>{let yy=sy(v); line(x0,yy,x0+w,yy,'grid'); text(x0-10,yy+4,fmt(v,y),'tick','end')}); line(x0,y0+h,x0+w,y0+h,'axis'); line(x0,y0,x0,y0+h,'axis'); if(panels.length>1)text(x0+w/2,y0+14,p,'axisLabel','middle'); pr.forEach(r=>{let rad=s&&hasMetricNum(r,s)?Math.max(3,Math.min(12,3+Math.sqrt(metricNum(r,s))/3)):5; let c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',sx(r.__x)); c.setAttribute('cy',sy(r.__y)); c.setAttribute('r',rad); c.setAttribute('fill',competitionColor(r.competition)); c.setAttribute('class','pt'); c.addEventListener('mousemove',e=>{tip.innerHTML=`<b>${esc(r.team)}</b><br>${fmt(r.year,'year')} ${esc(r.competition)} #${fmt(r.car_num,'car_num')}<br>${x==='rank_by_y'?'Rank':metricLabel(x)}: ${fmt(r.__x,xKey)}<br>${metricLabel(y)}: ${fmt(r.__y,y)}<br>Total: ${fmt(valueOf(r,'total_score_clean'),'total_score_clean')}<br>Weight basis: ${esc(r.weight_basis)}`; tip.style.display='block'; positionTip(e)}); c.addEventListener('mouseleave',()=>tip.style.display='none'); svg.appendChild(c)}); }); text(W/2,H-18,(x==='rank_by_y'?'Rank by '+metricLabel(y):metricLabel(x)),'axisLabel','middle'); let yl=text(24,H/2,metricLabel(y),'axisLabel','middle'); yl.setAttribute('transform',`rotate(-90 24 ${H/2})`); addWatermark(svg,W,H);

function drawDistribution(rows,y,W,H,svg,tip){const margin=chartMargins(W); const panels=$('splitMode').checked?['All']:[...new Set(rows.map(r=>r.competition))].sort(); const pw=(W-margin.l-margin.r)/Math.max(1,panels.length); panels.forEach((p,pi)=>{let pr=p==='All'?rows:rows.filter(r=>r.competition===p); let yr=extent(pr.map(r=>r.__y),y); let bins=makeBins(pr,yr,y); let br=[bins[0]?.lo??yr[0],bins[bins.length-1]?.hi??yr[1]]; let maxCount=Math.max(1,...bins.map(b=>b.total)); let x0=margin.l+pi*pw,y0=margin.t,w=Math.max(1,pw-12),h=Math.max(1,H-margin.t-margin.b); let sx=i=>x0+i*w/bins.length, bw=Math.max(1,w/bins.length-2), sy=v=>y0+h-v/maxCount*h; for(let i=0;i<6;i++){let yy=y0+i*h/5; line(x0,yy,x0+w,yy,'grid'); text(x0-10,yy+4,fmt(maxCount-i*maxCount/5),'tick','end')} bins.forEach((b,i)=>{let stackY=y0+h; Object.entries(b.byComp).sort(([a],[b])=>a.localeCompare(b)).forEach(([comp,count])=>{let bh=count/maxCount*h; if(bh<=0)return; let rect=document.createElementNS('http://www.w3.org/2000/svg','rect'); rect.setAttribute('x',sx(i)+1); rect.setAttribute('y',stackY-bh); rect.setAttribute('width',bw); rect.setAttribute('height',bh); rect.setAttribute('fill',competitionColor(comp)); rect.setAttribute('class','pt'); rect.addEventListener('mousemove',e=>{tip.innerHTML=distributionTip(b,y); tip.style.display='block'; positionTip(e)}); rect.addEventListener('mouseleave',()=>tip.style.display='none'); svg.appendChild(rect); stackY-=bh})}); tickValues(br,y).forEach(v=>{let xx=x0+(v-br[0])/(br[1]-br[0])*w; text(xx,y0+h+20,fmt(v,y),'tick','middle')}); line(x0,y0+h,x0+w,y0+h,'axis'); line(x0,y0,x0,y0+h,'axis'); if(panels.length>1)text(x0+w/2,y0+14,p,'axisLabel','middle')}); text(W/2,H-18,metricLabel(y),'axisLabel','middle'); let yl=text(24,H/2,'Count','axisLabel','middle'); yl.setAttribute('transform',`rotate(-90 24 ${H/2})`); addWatermark(svg,W,H);
 function line(x1,y1,x2,y2,cls){let l=document.createElementNS('http://www.w3.org/2000/svg','line'); l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('class',cls);svg.appendChild(l)} function text(x,y,t,cls,anchor){let el=document.createElementNS('http://www.w3.org/2000/svg','text'); el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('class',cls);el.setAttribute('text-anchor',anchor||'start');el.textContent=t;svg.appendChild(el);return el}}
function makeBins(rows,range,y){let lo=range[0],hi=range[1],count=Math.max(6,Math.min(24,Math.ceil(Math.sqrt(rows.length||1)))); if(isScoreKey(y)){let width=scoreBinWidth(Math.max(1,hi-lo)); lo=Math.floor(lo/width)*width; hi=Math.ceil(hi/width)*width; if(hi<=lo)hi=lo+width; count=Math.max(1,Math.round((hi-lo)/width)); return fillBins(rows,lo,width,count)} if(isIntegerKey(y)){let span=Math.max(1,Math.floor(hi)-Math.ceil(lo)+1); count=Math.min(count,span)} let width=(hi-lo)/count||1; return fillBins(rows,lo,width,count)}
function fillBins(rows,lo,width,count){return Array.from({length:count},(_,i)=>({lo:lo+i*width,hi:lo+(i+1)*width,total:0,byComp:{}})).map((b,i,arr)=>{rows.forEach(r=>{let v=r.__y; let bi=Math.min(arr.length-1,Math.max(0,Math.floor((v-lo)/width))); if(bi!==i)return; b.total++; b.byComp[r.competition]=(b.byComp[r.competition]||0)+1}); return b})}
function isScoreKey(k){let m=metricMap[k]||{}; let s=[k,m.label,m.group].join(' ').toLowerCase(); return s.includes('score')||s.includes('points')}
function scoreBinWidth(span){let raw=span/20; return [5,10,15,20,25,30,40,50,75,100,125,150,200,250,500].find(w=>w>=raw)||Math.ceil(raw/5)*5}
function distributionTip(b,y){let parts=Object.entries(b.byComp).sort(([a],[b])=>a.localeCompare(b)).map(([c,n])=>`${esc(c)}: ${n}`).join('<br>'); return `<b>${metricLabel(y)}</b><br>${fmt(b.lo,y)} to ${fmt(b.hi,y)}<br>Total: ${b.total}${parts?'<br>'+parts:''}`}
function drawTimeSeries(rows,y,W,H,svg,tip){const margin=chartMargins(W); const panels=$('splitMode').checked?['All']:[...new Set(rows.map(r=>r.competition))].sort(); const pw=(W-margin.l-margin.r)/Math.max(1,panels.length); panels.forEach((p,pi)=>{let pr=(p==='All'?rows:rows.filter(r=>r.competition===p)).sort((a,b)=>a.__x-b.__x||String(a.vehicle_type||'').localeCompare(String(b.vehicle_type||''))||String(a.competition).localeCompare(String(b.competition))); let xr=extent(pr.map(r=>r.__x),'year'),yr=extent(pr.map(r=>r.__y),y); const x0=margin.l+pi*pw,y0=margin.t,w=Math.max(1,pw-12),h=Math.max(1,H-margin.t-margin.b); const sx=v=>x0+(v-xr[0])/(xr[1]-xr[0])*w, sy=v=>y0+h-(v-yr[0])/(yr[1]-yr[0])*h; tickValues(xr,'year').forEach(v=>{let xx=sx(v); line(xx,y0,xx,y0+h,'grid'); text(xx,y0+h+20,fmt(v,'year'),'tick','middle')}); tickValues(yr,y).forEach(v=>{let yy=sy(v); line(x0,yy,x0+w,yy,'grid'); text(x0-10,yy+4,fmt(v,y),'tick','end')}); let groupKey=r=>r.__competitionRow?[r.competition,r.vehicle_type||''].join('|'):r.competition; let groups=Object.groupBy?Object.groupBy(pr,groupKey):groupBy(pr,groupKey); Object.values(groups).forEach(rs=>{let comp=rs[0]?.competition||''; let path=document.createElementNS('http://www.w3.org/2000/svg','path'); path.setAttribute('d',rs.map((r,i)=>(i?'L':'M')+sx(r.__x)+' '+sy(r.__y)).join(' ')); path.setAttribute('stroke',competitionColor(comp)); path.setAttribute('class','linePath'); svg.appendChild(path); rs.forEach(r=>point(r,sx,sy,comp))}); line(x0,y0+h,x0+w,y0+h,'axis'); line(x0,y0,x0,y0+h,'axis'); if(panels.length>1)text(x0+w/2,y0+14,p,'axisLabel','middle');
 function point(r,sx,sy,comp){let c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',sx(r.__x)); c.setAttribute('cy',sy(r.__y)); c.setAttribute('r',5); c.setAttribute('fill',competitionColor(comp)); c.setAttribute('class','pt'); c.addEventListener('mousemove',e=>{let head=r.__competitionRow?`${fmt(r.year,'year')} ${esc(r.competition)} ${esc(r.vehicle_type||'')}`:`${fmt(r.year,'year')} ${esc(r.competition)} #${fmt(r.car_num,'car_num')}`; tip.innerHTML=`<b>${esc(r.team)}</b><br>${head}<br>${metricLabel(y)}: ${fmt(r.__y,y)}`; tip.style.display='block'; positionTip(e)}); c.addEventListener('mouseleave',()=>tip.style.display='none'); svg.appendChild(c)} }); text(W/2,H-18,'Year','axisLabel','middle'); let yl=text(24,H/2,metricLabel(y),'axisLabel','middle'); yl.setAttribute('transform',`rotate(-90 24 ${H/2})`); addWatermark(svg,W,H);
 function line(x1,y1,x2,y2,cls){let l=document.createElementNS('http://www.w3.org/2000/svg','line'); l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('class',cls);svg.appendChild(l)} function text(x,y,t,cls,anchor){let el=document.createElementNS('http://www.w3.org/2000/svg','text'); el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('class',cls);el.setAttribute('text-anchor',anchor||'start');el.textContent=t;svg.appendChild(el);return el}}
function groupBy(rows,fn){return rows.reduce((acc,r)=>{let k=fn(r); (acc[k]??=[]).push(r); return acc},{})}
function tickValues(range,key){if(!isIntegerKey(key))return [0,1,2,3,4,5].map(i=>range[0]+i*(range[1]-range[0])/5); let lo=Math.ceil(range[0]),hi=Math.floor(range[1]); if(hi<lo)return [Math.round((range[0]+range[1])/2)]; let step=niceIntStep(Math.max(1,(hi-lo)/5)); let start=Math.ceil(lo/step)*step, vals=[]; for(let v=start;v<=hi;v+=step)vals.push(v); return vals.length?vals:[lo]}

function positionTip(e){const tip=$('tip'),wrap=$('chartWrap'),pad=8,gap=14; const W=wrap.clientWidth,H=wrap.clientHeight,tw=tip.offsetWidth,th=tip.offsetHeight; let left=e.offsetX+gap,top=e.offsetY+gap; if(left+tw+pad>W)left=e.offsetX-tw-gap; if(top+th+pad>H)top=e.offsetY-th-gap; tip.style.left=Math.max(pad,Math.min(left,W-tw-pad))+'px'; tip.style.top=Math.max(pad,Math.min(top,H-th-pad))+'px';}
function table(rows,x,y){let xCol=x==='rank_by_y'?'rank':x; let cols=x===COMP_TIME_KEY?['plot','competition','year','vehicle_type',y]:(x===DIST_KEY||x===TIME_KEY)?['plot','team','competition','year','car_num',y]:['plot','team','competition','year','car_num',xCol,y]; let data=x===COMP_TIME_KEY?competitionRows(rows):(x==='rank_by_y'?rankRows(rows,y,true):rows); data.sort((a,b)=>{let av=sortCol==='rank'?a.__rank:valueOf(a,sortCol), bv=sortCol==='rank'?b.__rank:valueOf(b,sortCol); let na=+av, nb=+bv; let cmp=Number.isFinite(na)&&Number.isFinite(nb)?na-nb:String(av??'').localeCompare(String(bv??'')); return sortDir==='asc'?cmp:-cmp}); tableState={cols,data,rowH:31}; const th=cols.map(c=>`<th data-c="${c}">${tableLabel(c)}</th>`).join(''); $('rowsTable').innerHTML=`<thead><tr>${th}</tr></thead><tbody></tbody>`; document.querySelectorAll('#rowsTable th').forEach(h=>h.onclick=()=>{let c=h.dataset.c;if(c==='plot')return; sortDir=(sortCol===c&&sortDir==='asc')?'desc':'asc';sortCol=c;$('tableWrap').scrollTop=0;render()}); renderVirtualRows();}
function renderVirtualRows(){let tbody=$('rowsTable').tBodies[0]; if(!tbody)return; let wrap=$('tableWrap'),{cols,data,rowH}=tableState,overscan=12; let visible=Math.ceil(wrap.clientHeight/rowH)+overscan*2; let maxStart=Math.max(0,data.length-visible); let start=Math.min(maxStart,Math.max(0,Math.floor(wrap.scrollTop/rowH)-overscan)); let end=Math.min(data.length,start+visible); let top=start*rowH,bottom=Math.max(0,(data.length-end)*rowH); let rows=[]; if(top)rows.push(`<tr style="height:${top}px"><td colspan="${cols.length}" style="padding:0;border:0"></td></tr>`); rows.push(...data.slice(start,end).map(r=>`<tr>${cols.map(c=>cellHtml(r,c)).join('')}</tr>`)); if(bottom)rows.push(`<tr style="height:${bottom}px"><td colspan="${cols.length}" style="padding:0;border:0"></td></tr>`); tbody.innerHTML=rows.join(''); tbody.querySelectorAll('.plotToggle').forEach(cb=>cb.onchange=e=>{if(!e.target.checked)omitted.add(e.target.dataset.k);render()});}

function splitters(){drag($('splitLeft'),dx=>{let p=$('leftPanel'); p.style.width=Math.max(230,Math.min(520,p.offsetWidth+dx))+'px'; schedulePlotRedraw()}); drag($('splitRows'),dx=>{let p=$('rowsPanel'),w=Math.max(260,Math.min(780,p.getBoundingClientRect().width-dx))+'px'; p.style.width=w; p.style.flexBasis=w; schedulePlotRedraw()}); function drag(el,fn){let sx=0,active=false; el.onpointerdown=e=>{active=true; sx=e.clientX; el.setPointerCapture(e.pointerId); document.body.style.userSelect='none'}; el.onpointermove=e=>{if(!active)return; fn(e.clientX-sx); sx=e.clientX}; el.onpointerup=el.onpointercancel=e=>{if(!active)return; active=false; if(el.hasPointerCapture(e.pointerId))el.releasePointerCapture(e.pointerId); document.body.style.userSelect=''; schedulePlotRedraw()}}}
