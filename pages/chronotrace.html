          const nextCol = col === 0 ? 1 : 0;
          const nextRow = col === 0 ? row : row + 1;
          const nextCell = tableBody.querySelector(`.powertrain-cell[data-gear-row="${nextRow}"][data-gear-col="${nextCol}"]`);
          if (nextCell) {
            nextCell.focus();
            placeCaretAtEnd(nextCell);
          }
        }
      });

      tableBody.addEventListener("input", (e) => {
        const cell = e.target.closest(".powertrain-cell");
        if (!cell) return;
        const sanitized = cell.textContent.replace(/\r?\n/g, " ");
        if (sanitized !== cell.textContent) {
          cell.textContent = sanitized;
          placeCaretAtEnd(cell);
        }
        updateGearSpec(vehicle, parseInt(cell.dataset.gearRow, 10) || 0, parseInt(cell.dataset.gearCol, 10) || 0, sanitized);
      });
    }

    function ensureSpecDefaults(vehicle) {
      if (!vehicle) return;
      if (!vehicle.spec) {
        vehicle.spec = cloneDefaultSpec();
      }
      if (!vehicle.spec.engineData || vehicle.spec.engineData.length === 0) {
        vehicle.spec.engineData = cloneDefaultSpec().engineData;
      }
      if (!vehicle.spec.gearRatios || vehicle.spec.gearRatios.length === 0) {
        vehicle.spec.gearRatios = [...cloneDefaultSpec().gearRatios];
      }
    }

    function renderEngineTable(tableBody, vehicle) {
      if (!tableBody || !vehicle) return;
      const data = (vehicle.spec && vehicle.spec.engineData) ? vehicle.spec.engineData : cloneDefaultSpec().engineData;
      tableBody.innerHTML = data.map((row, idx) => `
        <tr>
          <td class="powertrain-cell" contenteditable="true" data-row="${idx}" data-col="0">${row.rpm ?? ""}</td>
          <td class="powertrain-cell" contenteditable="true" data-row="${idx}" data-col="1">${row.torque ?? ""}</td>
        </tr>
      `).join("");
    }

    function renderGearTable(tableBody, vehicle) {
      if (!tableBody || !vehicle) return;
      const ratios = (vehicle.spec && vehicle.spec.gearRatios) ? vehicle.spec.gearRatios : cloneDefaultSpec().gearRatios;
      tableBody.innerHTML = ratios.map((ratio, idx) => `
        <tr>
          <td class="powertrain-cell" contenteditable="true" data-gear-row="${idx}" data-gear-col="0">${idx + 1}</td>
          <td class="powertrain-cell" contenteditable="true" data-gear-row="${idx}" data-gear-col="1">${ratio ?? ""}</td>
        </tr>
      `).join("");
    }

    function addEngineRow(id) {
      const vehicle = vehicles.find(v => v.id === id);
      if (!vehicle) return;
      ensureSpecDefaults(vehicle);
      vehicle.spec.engineData.push({ rpm: "", torque: "" });
      const body = document.getElementById(`engineTorqueTableBody-${id}`);
      if (body) {
        const idx = vehicle.spec.engineData.length - 1;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="powertrain-cell" contenteditable="true" data-row="${idx}" data-col="0"></td>
          <td class="powertrain-cell" contenteditable="true" data-row="${idx}" data-col="1"></td>
        `;
        body.appendChild(row);
      }
      refreshTractiveChart(id);
    }

    function removeEngineRow(id) {
      const vehicle = vehicles.find(v => v.id === id);
      if (!vehicle || !vehicle.spec || !vehicle.spec.engineData) return;
      if (vehicle.spec.engineData.length <= 1) return;
      vehicle.spec.engineData.pop();
      const body = document.getElementById(`engineTorqueTableBody-${id}`);
      if (body && body.lastElementChild) {
        body.removeChild(body.lastElementChild);
      }
      refreshTractiveChart(id);
    }

    function addGearRow(id) {
      const vehicle = vehicles.find(v => v.id === id);
      if (!vehicle) return;
      ensureSpecDefaults(vehicle);
      vehicle.spec.gearRatios.push("");
      const body = document.getElementById(`gearRatioTableBody-${id}`);
      if (body) {
        const idx = vehicle.spec.gearRatios.length - 1;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="powertrain-cell" contenteditable="true" data-gear-row="${idx}" data-gear-col="0">${idx + 1}</td>
          <td class="powertrain-cell" contenteditable="true" data-gear-row="${idx}" data-gear-col="1"></td>
        `;
        body.appendChild(row);
      }
      refreshTractiveChart(id);
    }

    function removeGearRow(id) {
      const vehicle = vehicles.find(v => v.id === id);
      if (!vehicle || !vehicle.spec || !vehicle.spec.gearRatios) return;
      if (vehicle.spec.gearRatios.length <= 1) return;
      vehicle.spec.gearRatios.pop();
      const body = document.getElementById(`gearRatioTableBody-${id}`);
      if (body && body.lastElementChild) {
        body.removeChild(body.lastElementChild);
      }
      refreshTractiveChart(id);
    }
    function updateEngineSpec(vehicle, rowIdx, colIdx, value) {
      if (!vehicle) return;
      vehicle.spec = vehicle.spec || {};
      vehicle.spec.engineData = vehicle.spec.engineData || [];
      while (vehicle.spec.engineData.length <= rowIdx) {
        vehicle.spec.engineData.push({ rpm: "", torque: "" });
      }
      const numericVal = value === "" ? "" : parseFloat(value);
      if (colIdx === 0) {
        vehicle.spec.engineData[rowIdx].rpm = isNaN(numericVal) ? value : numericVal;
      } else if (colIdx === 1) {
        vehicle.spec.engineData[rowIdx].torque = isNaN(numericVal) ? value : numericVal;
      }
      if (vehicle.id) refreshTractiveChart(vehicle.id);
    }

    function updateGearSpec(vehicle, rowIdx, colIdx, value) {
      if (!vehicle) return;
      vehicle.spec = vehicle.spec || {};
      vehicle.spec.gearRatios = vehicle.spec.gearRatios || [];
      const numericVal = value === "" ? "" : parseFloat(value);
      if (colIdx === 1) {
        vehicle.spec.gearRatios[rowIdx] = isNaN(numericVal) ? value : numericVal;
      }
      if (vehicle.id) refreshTractiveChart(vehicle.id);
    }

    const TrackEditor = {
      elevationStops: [
        { t: 0.0, color: "#2d7ff9", rgb: [45, 127, 249] },
        { t: 0.3, color: "#3cc7d7", rgb: [60, 199, 215] },
        { t: 0.6, color: "#8fd85a", rgb: [143, 216, 90] },
        { t: 0.82, color: "#ffd166", rgb: [255, 209, 102] },
        { t: 1.0, color: "#ff6b6b", rgb: [255, 107, 107] }
      ],

      ensureDefaults(track) {
        if (!track) return;
        if (!track.spec) {
          track.spec = cloneDefaultTrackSpec();
        }
        if (!Array.isArray(track.spec.points) || track.spec.points.length === 0) {
          track.spec.points = cloneDefaultTrackSpec().points;
        }
        if (!track.spec.circuitType) {
          track.spec.circuitType = cloneDefaultTrackSpec().circuitType;
        }
      },

      ensureTableState(id) {
        const key = `${id}`;
        if (!trackTableStates.has(key)) {
          trackTableStates.set(key, {
            page: 0,
            pageSize: TRACK_TABLE_PAGE_SIZE
          });
        }
        return trackTableStates.get(key);
      },

      getPageInfo(id, track) {
        const state = TrackEditor.ensureTableState(id);
        const totalRows = track?.spec?.points?.length || 0;
        const pageSize = state.pageSize || TRACK_TABLE_PAGE_SIZE;
        const totalPages = Math.max(1, Math.ceil(Math.max(totalRows, 1) / pageSize));
        state.page = Math.min(Math.max(state.page, 0), totalPages - 1);
        const startRow = state.page * pageSize;
        const endRow = Math.min(totalRows, startRow + pageSize);
        return { state, totalRows, pageSize, totalPages, startRow, endRow };
      },

      setPageForRow(id, rowIdx) {
        const state = TrackEditor.ensureTableState(id);
        state.page = Math.max(0, Math.floor(Math.max(0, rowIdx) / (state.pageSize || TRACK_TABLE_PAGE_SIZE)));
      },

      shiftPage(id, delta) {
        const track = tracks.find(t => t.id === id);
        if (!track) return;
        const state = TrackEditor.ensureTableState(id);
        state.page += delta;
        TrackEditor.renderCoordinateTable(document.getElementById(`trackCoordinateTableBody-${id}`), track);
      },

      updateTableStatus(id, track) {
        const statusEl = document.getElementById(`trackTableStatus-${id}`);
        const prevBtn = document.getElementById(`prevTrackPage-${id}`);
        const nextBtn = document.getElementById(`nextTrackPage-${id}`);
        if (!statusEl) return;

        const { totalRows, totalPages, startRow, endRow } = TrackEditor.getPageInfo(id, track);
        const compact = totalRows > TRACK_TABLE_COMPACT_THRESHOLD;
        statusEl.classList.toggle("compact", compact);
        statusEl.textContent = totalRows === 0
          ? "Showing 0 of 0 rows"
          : compact
            ? `Showing rows ${startRow + 1}-${endRow} of ${totalRows} (${totalPages} pages)`
            : `Showing all ${totalRows} rows`;
        if (prevBtn) prevBtn.disabled = startRow <= 0;
        if (nextBtn) nextBtn.disabled = endRow >= totalRows;
      },

      resizePointArray(track, targetLength) {
        TrackEditor.ensureDefaults(track);
        const nextLength = Math.max(1, targetLength);
        while (track.spec.points.length < nextLength) {
          track.spec.points.push({ x: "", y: "", z: "" });
        }
        if (track.spec.points.length > nextLength) {
          track.spec.points.length = nextLength;
        }
      },

      normalizeCellValue(value) {
        const trimmed = `${value ?? ""}`.trim();
        if (trimmed === "") return "";
        const numericVal = parseFloat(trimmed);
        return Number.isNaN(numericVal) ? trimmed : numericVal;
      },

      setPointValue(track, rowIdx, colIdx, value) {
        const prop = ["x", "y", "z"][colIdx];
        if (!prop) return;
        track.spec.points[rowIdx][prop] = TrackEditor.normalizeCellValue(value);
      },

      renderCoordinateTable(tableBody, track) {
        if (!tableBody || !track) return;
        TrackEditor.ensureDefaults(track);
        const tableIdSuffix = tableBody.id.replace("trackCoordinateTableBody-", "");
        const { startRow, endRow } = TrackEditor.getPageInfo(tableIdSuffix, track);
        const visibleRows = track.spec.points.slice(startRow, endRow);
        tableBody.innerHTML = visibleRows.map((point, offset) => {
          const idx = startRow + offset;
          return `
          <tr>
            <td class="powertrain-cell" contenteditable="true" data-track-row="${idx}" data-track-col="0">${point.x ?? ""}</td>
            <td class="powertrain-cell" contenteditable="true" data-track-row="${idx}" data-track-col="1">${point.y ?? ""}</td>
            <td class="powertrain-cell" contenteditable="true" data-track-row="${idx}" data-track-col="2">${point.z ?? ""}</td>
          </tr>
        `;
        }).join("");
        TrackEditor.updateTableStatus(tableIdSuffix, track);
      },

      scheduleChartRefresh(id, immediate = false) {
        const existingTimer = trackRefreshTimers.get(id);
        if (existingTimer) {
          clearTimeout(existingTimer);
          trackRefreshTimers.delete(id);
        }
        if (immediate) {
          TrackEditor.refreshChart(id);
          return;
        }
        const timer = setTimeout(() => {
          trackRefreshTimers.delete(id);
          TrackEditor.refreshChart(id);
        }, TRACK_CHART_REFRESH_DEBOUNCE_MS);
        trackRefreshTimers.set(id, timer);
      },

      updatePoint(track, rowIdx, colIdx, value, refresh = true) {
        if (!track) return;
        TrackEditor.ensureDefaults(track);
        TrackEditor.resizePointArray(track, rowIdx + 1);
        TrackEditor.setPointValue(track, rowIdx, colIdx, value);
        if (refresh && track.id) TrackEditor.scheduleChartRefresh(track.id);
      },

      addRow(id) {
        const track = tracks.find(t => t.id === id);
        if (!track) return;
        TrackEditor.resizePointArray(track, (track.spec?.points?.length || 0) + 1);
        TrackEditor.setPageForRow(id, Math.max(0, track.spec.points.length - 1));
        TrackEditor.renderCoordinateTable(document.getElementById(`trackCoordinateTableBody-${id}`), track);
        TrackEditor.scheduleChartRefresh(id, true);
      },

      removeRow(id) {
        const track = tracks.find(t => t.id === id);
        if (!track) return;
        TrackEditor.ensureDefaults(track);
        if (track.spec.points.length <= 1) return;
        TrackEditor.resizePointArray(track, track.spec.points.length - 1);
        TrackEditor.renderCoordinateTable(document.getElementById(`trackCoordinateTableBody-${id}`), track);
        TrackEditor.scheduleChartRefresh(id, true);
      },

      attachClipboard(tableBody, track) {
        let activeRow = 0;
        let activeCol = 0;

        tableBody.addEventListener("focusin", (e) => {
          const cell = e.target.closest(".powertrain-cell");
          if (!cell) return;
          activeRow = parseInt(cell.dataset.trackRow, 10) || 0;
          activeCol = parseInt(cell.dataset.trackCol, 10) || 0;
        });

        tableBody.addEventListener("paste", (e) => {
          const cell = e.target.closest(".powertrain-cell");
          if (!cell) return;
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData("text");
          const rows = text
            .split(/\r?\n/)
            .map(row => row.replace(/\r/g, ""))
            .filter(row => row.length > 0)
            .map(row => row.split(/\t/).slice(0, 3));
          if (rows.length === 0) return;

          TrackEditor.resizePointArray(track, activeRow + rows.length);
          rows.forEach((cols, rIdx) => {
            const rowIndex = activeRow + rIdx;
            for (let cIdx = 0; cIdx < 3; cIdx += 1) {
              const colIndex = activeCol + cIdx;
              if (colIndex >= 3) continue;
              const nextValue = (cols[cIdx] ?? "").trim();
              TrackEditor.setPointValue(track, rowIndex, colIndex, nextValue);
            }
          });

          TrackEditor.setPageForRow(track.id, activeRow);
          TrackEditor.renderCoordinateTable(tableBody, track);
          TrackEditor.scheduleChartRefresh(track.id);
        });

        tableBody.addEventListener("keydown", (e) => {
          const cell = e.target.closest(".powertrain-cell");
          if (!cell) return;
          if (e.key === "Enter") {
            e.preventDefault();
            const row = parseInt(cell.dataset.trackRow, 10) || 0;
            const col = parseInt(cell.dataset.trackCol, 10) || 0;
            const nextCol = col < 2 ? col + 1 : 0;
            const nextRow = col < 2 ? row : row + 1;
            if (nextRow >= (track.spec?.points?.length || 0)) {
              TrackEditor.addRow(track.id);
            } else if (Math.floor(nextRow / TRACK_TABLE_PAGE_SIZE) !== Math.floor(row / TRACK_TABLE_PAGE_SIZE)) {
              TrackEditor.setPageForRow(track.id, nextRow);
              TrackEditor.renderCoordinateTable(tableBody, track);
            }
            const nextCell = tableBody.querySelector(`.powertrain-cell[data-track-row="${nextRow}"][data-track-col="${nextCol}"]`);
            if (nextCell) {
              nextCell.focus();
              placeCaretAtEnd(nextCell);
            }
          }
        });

        tableBody.addEventListener("input", (e) => {
          const cell = e.target.closest(".powertrain-cell");
          if (!cell) return;
          const sanitized = cell.textContent.replace(/\r?\n/g, " ");
          if (sanitized !== cell.textContent) {
            cell.textContent = sanitized;
            placeCaretAtEnd(cell);
          }
          TrackEditor.updatePoint(
            track,
            parseInt(cell.dataset.trackRow, 10) || 0,
            parseInt(cell.dataset.trackCol, 10) || 0,
            sanitized
          );
        });
      },

      parsePoints(track) {
        TrackEditor.ensureDefaults(track);
        return track.spec.points
          .map((point) => {
            const x = Number(point.x);
            const y = Number(point.y);
            const z = point.z === "" || point.z === null || point.z === undefined ? 0 : Number(point.z);
            if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
            return {
              x,
              y,
              z: Number.isFinite(z) ? z : 0
            };
          })
          .filter(Boolean);
      },

      interpolateColor(stops, t) {
        if (stops.length === 0) return "rgb(77,163,255)";
        if (stops.length === 1) return stops[0].color;
        const clamped = Math.max(0, Math.min(1, t));
        for (let i = 0; i < stops.length - 1; i += 1) {
          const start = stops[i];
          const end = stops[i + 1];
          if (clamped >= start.t && clamped <= end.t) {
            const localT = (clamped - start.t) / Math.max(1e-9, end.t - start.t);
            const color = start.rgb.map((value, idx) => Math.round(value + (end.rgb[idx] - value) * localT));
            return `rgb(${color[0]},${color[1]},${color[2]})`;
          }
        }
        return stops[stops.length - 1].color;
      },

      getElevationColor(z, zMin, zMax) {
        const span = Math.max(1e-9, zMax - zMin);
        const normalized = (z - zMin) / span;
        return TrackEditor.interpolateColor(TrackEditor.elevationStops, normalized);
      },

      computeMetrics(track) {
        const points = TrackEditor.parsePoints(track);
        const isClosed = (track?.spec?.circuitType || "closed") === "closed";
        const xs = points.map(point => point.x);
        const ys = points.map(point => point.y);
        const zs = points.map(point => point.z);
        const zMin = zs.length ? Math.min(...zs) : 0;
        const zMax = zs.length ? Math.max(...zs) : 0;

        let planLength = 0;
        for (let i = 1; i < points.length; i += 1) {
          planLength += Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
        }
        if (isClosed && points.length > 2) {
          planLength += Math.hypot(points[0].x - points[points.length - 1].x, points[0].y - points[points.length - 1].y);
        }

        const footprintPoints = points.map(point => ({
          x: point.x,
          y: point.y,
          z: point.z
        }));
        if (isClosed && points.length > 2) {
          footprintPoints.push({
            x: points[0].x,
            y: points[0].y,
            z: points[0].z
          });
        }

        const xMinBase = xs.length ? Math.min(...xs) : -10;
        const xMaxBase = xs.length ? Math.max(...xs) : 10;
        const yMinBase = ys.length ? Math.min(...ys) : -10;
        const yMaxBase = ys.length ? Math.max(...ys) : 10;
        const xCenter = (xMinBase + xMaxBase) / 2;
        const yCenter = (yMinBase + yMaxBase) / 2;
        const span = Math.max(xMaxBase - xMinBase, yMaxBase - yMinBase, 10);
        const paddedSpan = span * 1.12;

        return {
          points,
          footprintPoints,
          isClosed,
          pointCount: points.length,
          planLength,
          zMin,
          zMax,
          axisBounds: {
            xMin: xCenter - paddedSpan / 2,
            xMax: xCenter + paddedSpan / 2,
            yMin: yCenter - paddedSpan / 2,
            yMax: yCenter + paddedSpan / 2
          }
        };
      },

      sampleDisplayPoints(points, target = TRACK_CHART_SAMPLE_TARGET) {
        if (points.length <= target) return points;
        const desiredCount = Math.max(2, target);
        const lastIdx = points.length - 1;
        const step = lastIdx / (desiredCount - 1);
        const sampled = [];
        let previousIdx = -1;
        for (let i = 0; i < desiredCount; i += 1) {
          const idx = Math.min(lastIdx, Math.round(i * step));
          if (idx === previousIdx) continue;
          sampled.push(points[idx]);
          previousIdx = idx;
        }
        if (sampled[sampled.length - 1] !== points[lastIdx]) {
          sampled.push(points[lastIdx]);
        }
        return sampled;
      },

      buildFootprintDatasets(metrics) {
        const zMin = metrics.zMin;
        const zMax = metrics.zMax;
        const outlinePoints = TrackEditor.sampleDisplayPoints(metrics.footprintPoints);
        const denseMode = metrics.pointCount > TRACK_CHART_MARKER_THRESHOLD;
        const colorSampleTarget = denseMode ? 1600 : Math.min(Math.max(metrics.pointCount, 48), 900);
        const colorPoints = TrackEditor.sampleDisplayPoints(metrics.points, colorSampleTarget);
        const pointColors = colorPoints.map(point => TrackEditor.getElevationColor(point.z, zMin, zMax));
        const datasets = denseMode
          ? [
              {
                label: "Track Outline",
                data: outlinePoints,
                parsing: false,
                showLine: true,
                borderColor: "rgba(232,240,251,0.48)",
                borderWidth: 2.2,
                pointRadius: 0,
                pointHoverRadius: 0,
                tension: 0,
                fill: false
              },
              {
                label: "Elevation Samples",
                data: colorPoints,
                parsing: false,
                showLine: false,
                pointRadius: 2.6,
                pointHoverRadius: 4,
                pointBackgroundColor: pointColors,
                pointBorderWidth: 0
              }
            ]
          : [
              {
                label: "Track Footprint",
                data: outlinePoints,
                parsing: false,
                showLine: true,
                borderColor: "#4da3ff",
                borderWidth: 2.5,
                pointRadius: outlinePoints.length > 1 ? 2.5 : 4,
                pointHoverRadius: 5,
                pointBackgroundColor: outlinePoints.map(point => TrackEditor.getElevationColor(point.z, zMin, zMax)),
                pointBorderWidth: 0,
                tension: 0,
                fill: false,
                segment: {
                  borderColor: (ctx) => {
                    const p0 = ctx.p0?.raw;
                    const p1 = ctx.p1?.raw;
                    if (!p0 || !p1) return "#4da3ff";
                    return TrackEditor.getElevationColor((p0.z + p1.z) / 2, zMin, zMax);
                  }
                }
              }
            ];

        if (metrics.points.length > 0) {
          datasets.push({
            label: "Start",
            data: [{ x: metrics.points[0].x, y: metrics.points[0].y, z: metrics.points[0].z }],
            parsing: false,
            showLine: false,
            pointRadius: 6,
            pointHoverRadius: 7,
            pointBackgroundColor: "#e8f0fb",
            pointBorderColor: "#0f1318",
            pointBorderWidth: 1.5
          });
        }

        if (!metrics.isClosed && metrics.points.length > 1) {
          const endPoint = metrics.points[metrics.points.length - 1];
          datasets.push({
            label: "End",
            data: [{ x: endPoint.x, y: endPoint.y, z: endPoint.z }],
            parsing: false,
            showLine: false,
            pointRadius: 6,
            pointHoverRadius: 7,
            pointBackgroundColor: "#ffd166",
            pointBorderColor: "#0f1318",
            pointBorderWidth: 1.5
          });
        }

        return datasets;
      },

      getChartView(chart) {
        if (!chart?.scales?.x || !chart?.scales?.y) return null;
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        const xMin = xScale.options.min ?? xScale.min;
        const xMax = xScale.options.max ?? xScale.max;
        const yMin = yScale.options.min ?? yScale.min;
        const yMax = yScale.options.max ?? yScale.max;
        const span = Math.max(xMax - xMin, yMax - yMin, 1);
        return {
          xCenter: (xMin + xMax) / 2,
          yCenter: (yMin + yMax) / 2,
          span
        };
      },

      applyChartView(chart, xCenter, yCenter, span) {
        if (!chart) return;
        const nextSpan = Math.max(1, span);
        const halfSpan = nextSpan / 2;
        chart.options.scales.x.min = xCenter - halfSpan;
        chart.options.scales.x.max = xCenter + halfSpan;
        chart.options.scales.y.min = yCenter - halfSpan;
        chart.options.scales.y.max = yCenter + halfSpan;
        chart.update("none");
        TrackEditor.updateViewStatus(chart);
      },

      updateViewStatus(chart) {
        const statusEl = chart?.$viewStatusEl;
        const baseBounds = chart?.$baseBounds;
        const view = TrackEditor.getChartView(chart);
        if (!statusEl || !view) return;
        if (!baseBounds) {
          statusEl.textContent = "1:1 view";
          return;
        }
        const baseSpan = Math.max(baseBounds.xMax - baseBounds.xMin, baseBounds.yMax - baseBounds.yMin, 1);
        const zoom = baseSpan / Math.max(view.span, 1);
        statusEl.textContent = `1:1 view • ${zoom.toFixed(2)}x`;
      },

      zoomChartAtPoint(chart, factor, pixelX, pixelY) {
        if (!chart?.scales?.x || !chart?.scales?.y) return;
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        const view = TrackEditor.getChartView(chart);
        if (!view) return;

        const currentXMin = view.xCenter - view.span / 2;
        const currentYMin = view.yCenter - view.span / 2;
        const anchorX = xScale.getValueForPixel(pixelX);
        const anchorY = yScale.getValueForPixel(pixelY);
        const relX = (anchorX - currentXMin) / view.span;
        const relY = (anchorY - currentYMin) / view.span;
        const nextSpan = view.span * factor;
        const nextCenterX = anchorX + (0.5 - relX) * nextSpan;
        const nextCenterY = anchorY + (0.5 - relY) * nextSpan;
        TrackEditor.applyChartView(chart, nextCenterX, nextCenterY, nextSpan);
      },

      zoomChart(id, factor) {
        const chart = trackFootprintCharts.get(id);
        const view = TrackEditor.getChartView(chart);
        if (!chart || !view) return;
        TrackEditor.applyChartView(chart, view.xCenter, view.yCenter, view.span * factor);
      },

      panChart(id, xFraction, yFraction) {
        const chart = trackFootprintCharts.get(id);
        const view = TrackEditor.getChartView(chart);
        if (!chart || !view) return;
        TrackEditor.applyChartView(
          chart,
          view.xCenter + view.span * xFraction,
          view.yCenter + view.span * yFraction,
          view.span
        );
      },

      resetChartView(id) {
        const chart = trackFootprintCharts.get(id);
        const bounds = chart?.$baseBounds;
        if (!chart || !bounds) return;
        chart.options.scales.x.min = bounds.xMin;
        chart.options.scales.x.max = bounds.xMax;
        chart.options.scales.y.min = bounds.yMin;
        chart.options.scales.y.max = bounds.yMax;
        chart.update("none");
        TrackEditor.updateViewStatus(chart);
      },

      attachChartInteractions(id, chart) {
        if (!chart || chart.$interactionCleanup) return;
        const canvas = chart.canvas;
        const statusEl = document.getElementById(`trackViewStatus-${id}`);
        chart.$viewStatusEl = statusEl || null;

        const panState = {
          active: false,
          lastX: 0,
          lastY: 0
        };

        const onMouseDown = (e) => {
          if (e.button !== 1) return;
          e.preventDefault();
          panState.active = true;
          panState.lastX = e.offsetX;
          panState.lastY = e.offsetY;
          canvas.style.cursor = "grabbing";
        };

        const onMouseMove = (e) => {
          if (!panState.active) return;
          e.preventDefault();
          const xScale = chart.scales?.x;
          const yScale = chart.scales?.y;
          const view = TrackEditor.getChartView(chart);
          if (!xScale || !yScale || !view) return;
          const dx = xScale.getValueForPixel(panState.lastX) - xScale.getValueForPixel(e.offsetX);
          const dy = yScale.getValueForPixel(panState.lastY) - yScale.getValueForPixel(e.offsetY);
          panState.lastX = e.offsetX;
          panState.lastY = e.offsetY;
          TrackEditor.applyChartView(chart, view.xCenter + dx, view.yCenter + dy, view.span);
        };

        const endPan = () => {
          if (!panState.active) return;
          panState.active = false;
          canvas.style.cursor = "";
        };

        const onWheel = (e) => {
          e.preventDefault();
          const factor = e.deltaY > 0 ? 1.12 : 0.88;
          TrackEditor.zoomChartAtPoint(chart, factor, e.offsetX, e.offsetY);
        };

        const onAuxClick = (e) => {
          if (e.button === 1) {
            e.preventDefault();
          }
        };

        canvas.addEventListener("mousedown", onMouseDown);
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", endPan);
        canvas.addEventListener("mouseleave", endPan);
        canvas.addEventListener("wheel", onWheel, { passive: false });
        canvas.addEventListener("auxclick", onAuxClick);

        chart.$interactionCleanup = () => {
          canvas.removeEventListener("mousedown", onMouseDown);
          window.removeEventListener("mousemove", onMouseMove);
          window.removeEventListener("mouseup", endPan);
          canvas.removeEventListener("mouseleave", endPan);
          canvas.removeEventListener("wheel", onWheel);
          canvas.removeEventListener("auxclick", onAuxClick);
        };
      },

        },

    function toXY(xs, ys) {
      return xs.map((x, i) => ({ x, y: ys[i] }));
    }

    function computeTractiveCurves(vehicle) {
      const spec = vehicle?.spec || cloneDefaultSpec();
      const rho = 1.225; // air density kg/m^3
      const g = 9.81;
      const mass = spec.weight || cloneDefaultSpec().weight;
      const Rr = spec.tireRadius || cloneDefaultSpec().tireRadius;
      const cd = spec.dragCoefficient || cloneDefaultSpec().dragCoefficient;
      const cl = spec.liftCoefficient || cloneDefaultSpec().liftCoefficient;
      const area = spec.frontalArea || cloneDefaultSpec().frontalArea;
      const mu = spec.longFriction || cloneDefaultSpec().longFriction;
      const rollingRes = (spec.rollingResistance !== undefined ? spec.rollingResistance : cloneDefaultSpec().rollingResistance) || 0;
      const finalDrive = spec.finalDriveRatio || 1;
      const driveEff = spec.driveEfficiency || 1;
      const gearRatios = (spec.gearRatios && spec.gearRatios.length > 0 ? spec.gearRatios : cloneDefaultSpec().gearRatios).map(parseFloat).filter(n => !isNaN(n) && n > 0);

      let enginePairs = (spec.engineData && spec.engineData.length > 0 ? spec.engineData : cloneDefaultSpec().engineData)
        .map(({ rpm, torque }) => ({ rpm: parseFloat(rpm), torque: parseFloat(torque) }))
        .filter(row => !isNaN(row.rpm) && !isNaN(row.torque))
        .sort((a, b) => a.rpm - b.rpm);
      if (enginePairs.length >= 2 && enginePairs[0].rpm > 0) {
        const a = enginePairs[0];
        const b = enginePairs[1];
        const slope = (b.torque - a.torque) / (b.rpm - a.rpm || 1);
        enginePairs = [{ rpm: 0, torque: Math.max(0, a.torque - a.rpm * slope) }, ...enginePairs];
      }

      if (enginePairs.length < 2 || gearRatios.length === 0) {
        const speeds = [0];
        const zeros = [0];
        return { speeds, tractive: zeros, drag: zeros, grip: zeros, maxVel: { speed: 0, force: 0, type: "gear" } };
      }

      const maxEngineRpm = enginePairs[enginePairs.length - 1].rpm;
      const topGear = Math.min(...gearRatios);
      const maxSpeed = (maxEngineRpm / (topGear * finalDrive)) * (2 * Math.PI * Rr / 60);
      const step = Math.max(0.5, maxSpeed / 120);

      const speeds = [];
      const tractive = [];
      const drag = [];
      const grip = [];
      const gearIdx = [];
      const gearForces = gearRatios.map(() => []);

      for (let v = 0; v <= maxSpeed; v += step) {
        const wheelRpm = v / (2 * Math.PI * Rr / 60);
        let maxForce = 0;
        let maxGear = 0;
        gearRatios.forEach((ratio, gi) => {
          const engRpm = wheelRpm * finalDrive * ratio;
          if (engRpm > maxEngineRpm || engRpm < enginePairs[0].rpm) {
            gearForces[gi].push(null);
            return;
          }
          const tq = interpTorque(enginePairs, engRpm);
          const driveTorque = tq * ratio * finalDrive * driveEff;
          const force = driveTorque / Rr;
          gearForces[gi].push(force);
          if (force > maxForce) {
            maxForce = force;
            maxGear = gi;
          }
        });

        const fDrag = 0.5 * rho * cd * area * v * v;
        const fLift = 0.5 * rho * cl * area * v * v;
        const normalLoad = mass * g - fLift;
        const driveAxles = (spec.drivetrainType === "FWD" || spec.drivetrainType === "RWD") ? 2 : 1;
        const fGrip = (mu * normalLoad) / driveAxles;
        const fRoll = normalLoad * rollingRes;

        speeds.push(Number(v.toFixed(2)));
        tractive.push(maxForce);
        drag.push(fDrag + fRoll);
        grip.push(fGrip);
        gearIdx.push(maxGear);
      }

      // Determine max velocity: aero-limited where available force (min of tractive and grip) crosses drag; else gear-limited at end
      let maxVel = { speed: speeds[speeds.length - 1], force: Math.min(tractive[tractive.length - 1], grip[grip.length - 1]), type: "gear" };
      for (let i = 1; i < speeds.length; i++) {
        const availPrev = Math.min(tractive[i - 1], grip[i - 1]);
        const avail = Math.min(tractive[i], grip[i]);
        if (avail <= drag[i]) {
          const dragPrev = drag[i - 1];
          const dragNow = drag[i];
          const dv = speeds[i] - speeds[i - 1];
          const da = (availPrev - dragPrev) - (avail - dragNow);
          const t = da === 0 ? 0 : (availPrev - dragPrev) / da;
          const vCross = speeds[i - 1] + Math.max(0, Math.min(1, t)) * dv;
          const fCross = dragPrev + (dragNow - dragPrev) * Math.max(0, Math.min(1, t));
          maxVel = { speed: vCross, force: fCross, type: "aero" };
          break;
        }
      }

      // Grip intersection (highest speed crossing)
      let gripIntersect = null;
      for (let i = 1; i < speeds.length; i++) {
        const diffPrev = tractive[i - 1] - grip[i - 1];
        const diffNow = tractive[i] - grip[i];
        if ((diffPrev >= 0 && diffNow <= 0) || (diffPrev <= 0 && diffNow >= 0)) {
          const t = diffPrev === diffNow ? 0 : diffPrev / (diffPrev - diffNow);
          const speedCross = speeds[i - 1] + t * (speeds[i] - speeds[i - 1]);
          const forceCross = grip[i - 1] + t * (grip[i] - grip[i - 1]);
          if (!gripIntersect || speedCross > gripIntersect.speed) {
            gripIntersect = { speed: speedCross, force: forceCross };
          }
        }
      }

      // Gear change points (where chosen gear ratio changes)
      const gearChanges = [];
      for (let i = 1; i < speeds.length; i++) {
        if (gearIdx[i] !== gearIdx[i - 1]) {
          gearChanges.push({ speed: speeds[i - 1], force: tractive[i - 1], gear: gearIdx[i - 1] });
        }
      }

      const gearCurves = gearRatios.map((ratio, i) => ({
        label: `Gear ${i + 1}`,
        ratio,
        forces: gearForces[i]
      }));

      return { speeds, tractive, drag, grip, maxVel, gripIntersect, gearChanges, maxSpeed, gearCurves };
    }

    function computeGGVEllipses(vehicle) {
      ensureSpecDefaults(vehicle);
      const spec = vehicle?.spec || cloneDefaultSpec();
      const rho = 1.225;
      const g = 9.81;
      const mass = spec.weight || cloneDefaultSpec().weight;
      const cd = (spec.dragCoefficient !== undefined ? spec.dragCoefficient : cloneDefaultSpec().dragCoefficient) || 0;
      const cl = (spec.liftCoefficient !== undefined ? spec.liftCoefficient : cloneDefaultSpec().liftCoefficient) || 0;
      const area = spec.frontalArea || cloneDefaultSpec().frontalArea;
      const muLat = (spec.latFriction !== undefined ? spec.latFriction : cloneDefaultSpec().latFriction) || 0;
      const muLong = (spec.longFriction !== undefined ? spec.longFriction : cloneDefaultSpec().longFriction) || 0;
      const rollingRes = (spec.rollingResistance !== undefined ? spec.rollingResistance : cloneDefaultSpec().rollingResistance) || 0;
      const drivetrainType = spec.drivetrainType || cloneDefaultSpec().drivetrainType;
      const driveWheelFactor = drivetrainType === "AWD" ? 1 : 0.5;

      const curves = computeTractiveCurves(vehicle);
      const vmax = Math.max(5, (curves.maxVel && curves.maxVel.speed) ? curves.maxVel.speed : curves.maxSpeed || 0);
      const speedSteps = [];
      for (let v = 0; v <= vmax; v += 10) {
        speedSteps.push(Number(v.toFixed(3)));
      }
      if (speedSteps[speedSteps.length - 1] < vmax - 0.5) {
        speedSteps.push(vmax);
      }

      const ellipses = [];
      let maxAbs = 0;
      const segments = 80;

      speedSteps.forEach(v => {
        const fDrag = 0.5 * rho * cd * area * v * v;
        const fLift = 0.5 * rho * cl * area * v * v;
        const normalLoad = Math.max(1, mass * g - fLift);
        const fRoll = normalLoad * rollingRes;

        const aLat = (muLat * normalLoad) / mass;
        const aLongGrip = (muLong * normalLoad) / mass;
        const aLongGripPos = aLongGrip * driveWheelFactor;

        const tractiveForce = interpValue(curves.speeds, curves.tractive, v);
        const resistiveForce = interpValue(curves.speeds, curves.drag, v);
        const tractionAccel = Math.max(0, tractiveForce) / mass;
        const resistiveAccel = resistiveForce / mass; // drag + rolling decel

        const pts = [];
        for (let i = 0; i <= segments; i++) {
          const theta = (i / segments) * Math.PI * 2;
          const x = aLat * Math.cos(theta);
          const sinT = Math.sin(theta);
          if (sinT >= 0) {
            const desired = aLongGripPos * sinT;
            const y = Math.min(desired, tractionAccel) - resistiveAccel; // follow grip then flatten at tractive cap, shifted by drag
            maxAbs = Math.max(maxAbs, Math.abs(x), Math.abs(y));
            pts.push({ x, y });
          } else {
            const y = aLongGrip * sinT - resistiveAccel; // braking uses full grip, plus aero drag decel
            maxAbs = Math.max(maxAbs, Math.abs(x), Math.abs(y));
            pts.push({ x, y });
          }
        }
        ellipses.push({ speed: v, data: pts });
      });

      return { ellipses, maxAbs: maxAbs || 1 };
    }

    function buildGGVDatasets(ellipses) {
      const total = Math.max(ellipses.length, 1);
      return ellipses.map((ellipse, idx) => {
        const hue = (idx * 360) / total;
        const color = `hsl(${hue}, 70%, 65%)`;
        return {
          label: `${ellipse.speed.toFixed(0)} m/s`,
          data: ellipse.data,
          borderColor: color,
          backgroundColor: "transparent",
          borderWidth: 1.5,
          tension: 0.25,
          pointRadius: 0,
          spanGaps: true
        };
      });
    }

    function interpValue(xs, ys, target) {
      if (!xs || !ys || xs.length === 0 || ys.length === 0) return 0;
      if (target <= xs[0]) return ys[0];
      for (let i = 1; i < xs.length; i++) {
        if (target <= xs[i]) {
          const t = (target - xs[i - 1]) / (xs[i] - xs[i - 1] || 1);
          const y1 = typeof ys[i - 1] === "number" ? ys[i - 1] : (ys[i - 1]?.y ?? 0);
          const y2 = typeof ys[i] === "number" ? ys[i] : (ys[i]?.y ?? 0);
          return y1 + t * (y2 - y1);
        }
      }
      return ys[ys.length - 1];
    }

    function interpTorque(pairs, rpm) {
      if (rpm < pairs[0].rpm || rpm > pairs[pairs.length - 1].rpm) return 0;
      for (let i = 0; i < pairs.length - 1; i++) {
        const a = pairs[i];
        const b = pairs[i + 1];
        if (rpm >= a.rpm && rpm <= b.rpm) {
          const t = (rpm - a.rpm) / (b.rpm - a.rpm || 1);
          return a.torque + t * (b.torque - a.torque);
        }
      }
      return 0;
    }

    function setActiveTab(tabId) {
      tabs.forEach(tab => {
        const active = (tab.tabId === tabId);
        tab.headerEl.classList.toggle("active", active);
        tab.contentEl.style.display = active ? "block" : "none";
      });
    }

    function closeTab(tabId) {
      const idx = tabs.findIndex(t => t.tabId === tabId);
      if (idx === -1) return;

      const tab = tabs[idx];
      if (tab.type === "track") {
        const chart = trackFootprintCharts.get(tab.id);
        if (chart) {
          if (chart.$interactionCleanup) {
            chart.$interactionCleanup();
          }
          chart.destroy();
          trackFootprintCharts.delete(tab.id);
        }
        const refreshTimer = trackRefreshTimers.get(tab.id);
        if (refreshTimer) {
          clearTimeout(refreshTimer);
          trackRefreshTimers.delete(tab.id);
        }
        trackTableStates.delete(`${tab.id}`);
      }
      tab.headerEl.remove();
      tab.contentEl.remove();
      tabs.splice(idx, 1);

      // Optionally switch to the last open tab
      if (tabs.length > 0) {
        setActiveTab(tabs[tabs.length - 1].tabId);
      }
    }

    function setSelectedTreeItem(itemEl) {
      if (selectedTreeItem) {
        selectedTreeItem.classList.remove("tree-selected");
      }
      selectedTreeItem = itemEl;
      if (selectedTreeItem) {
        selectedTreeItem.classList.add("tree-selected");
      }
    }

    function notifyEntityChanged(type) {
      ENTITY_CONFIG[type]?.syncOpenEditors?.();
    }

    function deleteEntityFromTree(type) {
      if (!selectedTreeItem || selectedTreeItem.getAttribute("data-type") !== type) {
        alert(`Select a ${type} in the tree to delete.`);
        return;
      }
      const config = ENTITY_CONFIG[type];
      const entityId = parseInt(selectedTreeItem.getAttribute("data-id"), 10);
      config.setCollection(config.getCollection().filter(entry => entry.id !== entityId));
      const openTabs = tabs.filter(t => t.type === type && t.id === entityId);
      openTabs.forEach(t => closeTab(t.tabId));
      selectedTreeItem.remove();
      selectedTreeItem = null;
      notifyEntityChanged(type);
    }

    function deleteVehicleFromTree() {
      deleteEntityFromTree("vehicle");
    }

    function deleteTrackFromTree() {
      deleteEntityFromTree("track");
    }

    function deleteEventFromTree() {
      deleteEntityFromTree("event");
    }

    function updateEntityNameInUI(collection, id, newName, headerEl) {
      const item = collection.find(entry => entry.id === id);
      if (item) {
        item.name = newName;
      }

      const treeItem = document.querySelector(`#project-tree li[data-id="${id}"]`);
      if (treeItem) {
        treeItem.textContent = newName;
      }

      if (headerEl) {
        const span = headerEl.querySelector("span:first-child");
        if (span) {
          span.textContent = newName;
        }
      }
    }

    function updateVehicleName(id, newName, headerEl) {
      updateEntityNameInUI(vehicles, id, newName, headerEl);
      notifyEntityChanged("vehicle");
    }

    function updateTrackName(id, newName, headerEl) {
      updateEntityNameInUI(tracks, id, newName, headerEl);
      notifyEntityChanged("track");
    }

    function updateEventName(id, newName, headerEl) {
      updateEntityNameInUI(eventsArray, id, newName, headerEl);
    }

    function setFormValues(id, bindings) {
      bindings.forEach(({ key, value }) => {
        const el = document.getElementById(`${key}-${id}`);
        if (el && value !== undefined) {
          el.value = value;
        }
      });
    }

    function specBindingsToFormValues(spec, bindings) {
      return bindings.map(({ key, prop }) => ({ key, value: spec?.[prop] }));
    }

    function bindNumericSpecFields(id, target, bindings, onUpdate, options = {}) {
      const emptyValue = Object.prototype.hasOwnProperty.call(options, "emptyValue") ? options.emptyValue : "";
      bindings.forEach(({ key, prop }) => {
        const el = document.getElementById(`${key}-${id}`);
        if (!el) return;
        el.addEventListener("input", () => {
          const value = el.value === "" ? emptyValue : parseFloat(el.value);
          target[prop] = Number.isNaN(value) ? el.value : value;
          if (onUpdate) onUpdate();
        });
      });
    }

    function applyTrackSpecToUI(id, spec) {
      const circuitTypeEl = document.getElementById(`trackCircuitType-${id}`);
      if (circuitTypeEl && spec?.circuitType) {
        circuitTypeEl.value = spec.circuitType;
      }
    }

    function applyEventSpecToUI(id, spec) {
      setFormValues(id, specBindingsToFormValues(spec, EVENT_NUMERIC_BINDINGS));
      const vehicleEl = document.getElementById(`eventVehicle-${id}`);
      if (vehicleEl) {
        vehicleEl.value = spec?.vehicleId !== undefined && spec?.vehicleId !== null ? `${spec.vehicleId}` : "";
      }
      const trackEl = document.getElementById(`eventTrack-${id}`);
      if (trackEl) {
        trackEl.value = spec?.trackId !== undefined && spec?.trackId !== null ? `${spec.trackId}` : "";
      }
    }

    function bindEventInputsToSpec(id, eventObj) {
      if (!eventObj) return;
      const vehicleEl = document.getElementById(`eventVehicle-${id}`);
      const trackEl = document.getElementById(`eventTrack-${id}`);

      if (vehicleEl) {
        vehicleEl.addEventListener("change", () => {
          ensureEventDefaults(eventObj);
          eventObj.spec.vehicleId = vehicleEl.value === "" ? "" : parseInt(vehicleEl.value, 10);
          updateEventSummary(id, eventObj.spec);
        });
      }
      if (trackEl) {
        trackEl.addEventListener("change", () => {
          ensureEventDefaults(eventObj);
          eventObj.spec.trackId = trackEl.value === "" ? "" : parseInt(trackEl.value, 10);
          updateEventSummary(id, eventObj.spec);
        });
      }

      bindNumericSpecFields(id, eventObj.spec, EVENT_NUMERIC_BINDINGS, () => {
        updateEventSummary(id, eventObj.spec);
      });
    }

    function applyVehicleSpecToUI(id, spec) {
      setFormValues(id, specBindingsToFormValues(spec, VEHICLE_NUMERIC_BINDINGS));
      const typeEl = document.getElementById(`drivetrainType-${id}`);
      if (typeEl && spec.drivetrainType) {
        typeEl.value = spec.drivetrainType;
      }

      const engineBody = document.getElementById(`engineTorqueTableBody-${id}`);
      if (engineBody && Array.isArray(spec.engineData)) {
        spec.engineData.forEach((row, idx) => {
          const rpmCell = engineBody.querySelector(`.powertrain-cell[data-row="${idx}"][data-col="0"]`);
          const tqCell = engineBody.querySelector(`.powertrain-cell[data-row="${idx}"][data-col="1"]`);
          if (rpmCell) rpmCell.textContent = row.rpm;
          if (tqCell) tqCell.textContent = row.torque;
        });
      }

      const gearBody = document.getElementById(`gearRatioTableBody-${id}`);
      if (gearBody && Array.isArray(spec.gearRatios)) {
        spec.gearRatios.forEach((ratio, idx) => {
          const ratioCell = gearBody.querySelector(`.powertrain-cell[data-gear-row="${idx}"][data-gear-col="1"]`);
          if (ratioCell) ratioCell.textContent = ratio;
        });
      }
    }

    function bindVehicleInputsToSpec(id, vehicle) {
      if (!vehicle) return;
      vehicle.spec = vehicle.spec || {};
      bindNumericSpecFields(id, vehicle.spec, VEHICLE_NUMERIC_BINDINGS, () => refreshTractiveChart(id), { emptyValue: null });

      const typeEl = document.getElementById(`drivetrainType-${id}`);
      if (typeEl) {
        typeEl.addEventListener("change", () => {
          vehicle.spec = vehicle.spec || {};
          vehicle.spec.drivetrainType = typeEl.value;
          refreshTractiveChart(id);
        });
      }
    }

    /********************************************************
     *   VEHICLE EDITOR: SUB-TAB AND RESIZE LOGIC (RIGHT HALF)
     ********************************************************/
    function initVehicleEditorLayout(tabId, vehicleId) {
      // 1) Sub-tab switching inside the vehicle editor
      const contentEl = document.querySelector(`.tab-panel[data-tab-id="${tabId}"]`);
      if (!contentEl) return;

      const tabHeaders = contentEl.querySelectorAll(".vehicle-editor-tab-header");
      const tabPanels = contentEl.querySelectorAll(".vehicle-editor-right-tab");

      tabHeaders.forEach(header => {
        header.addEventListener("click", () => {
          // Remove active from all headers/panels
          tabHeaders.forEach(h => h.classList.remove("active"));
          tabPanels.forEach(p => p.classList.remove("active"));

          // Activate the one we clicked
          header.classList.add("active");
          const subTab = header.getAttribute("data-sub-tab");
          const activePanel = contentEl.querySelector(`.vehicle-editor-right-tab[data-sub-tab="${subTab}"]`);
          if (activePanel) {
            activePanel.classList.add("active");
          }
        });
      });

      // 2) Resizable splitter between left and right
      const leftPane = contentEl.querySelector(".vehicle-editor-left");
      const resizer = contentEl.querySelector(".vehicle-editor-resizer");
      let isResizing = false;
      let startX = 0;
      let startWidthLeft = 0;

      resizer.addEventListener("mousedown", (e) => {
        e.preventDefault();
        isResizing = true;
        startX = e.clientX;
        // store the current numeric width of leftPane
        startWidthLeft = parseInt(document.defaultView.getComputedStyle(leftPane).width, 10);
        document.body.style.cursor = "col-resize";
      });

      function onMouseMove(e) {
        if (!isResizing) return;
        const dx = e.clientX - startX;
        const newWidth = startWidthLeft + dx;
        // set a sensible minimum to avoid negative widths
        if (newWidth > 50) {
          leftPane.style.width = `${newWidth}px`;
          leftPane.style.flex = `0 0 ${newWidth}px`; // force reflow in flex layout
          contentEl.querySelector(".vehicle-editor-right").style.minWidth = 0; // allow right to shrink
        }
      }

      function onMouseUp() {
        isResizing = false;
        document.body.style.cursor = "default";
      }

      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    }

    /********************************************************
     *                 RESIZER LOGIC (MAIN)
     ********************************************************/
    function initResizer() {
      const resizer = document.getElementById("resizer");
      const projectTree = document.getElementById("project-tree");
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;

      resizer.addEventListener("mousedown", (e) => {
        e.preventDefault();
        isResizing = true;
        startX = e.clientX;
        startWidth = projectTree.offsetWidth;
        document.body.style.cursor = "col-resize";
      });

      function onMouseMove(e) {
        if (!isResizing) return;
        const dx = e.clientX - startX;
        projectTree.style.width = `${startWidth + dx}px`;
      }

      function onMouseUp() {
        isResizing = false;
        document.body.style.cursor = "default";
      }

      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    }

    /********************************************************
     *             RIBBON BUTTON EVENT HANDLERS
     ********************************************************/
    function initToolbarActions() {
      /* VEHICLE CREATE / IMPORT / EXPORT */
      document.getElementById("btn-vehicle-create")?.addEventListener("click", () => {
        createEntity("vehicle");
      });
      document.getElementById("btn-vehicle-import")?.addEventListener("click", () => {
        fileManager.importVehicleFile();
      });
      document.getElementById("btn-vehicle-export")?.addEventListener("click", () => {
        fileManager.exportVehicleFile();
      });
      document.getElementById("btn-vehicle-delete")?.addEventListener("click", () => {
        deleteVehicleFromTree();
      });

      /* TRACK CREATE / IMPORT / EXPORT */
      document.getElementById("btn-track-create")?.addEventListener("click", () => {
        createEntity("track");
      });
      document.getElementById("btn-track-import")?.addEventListener("click", () => {
        fileManager.importTrackFile();
      });
      document.getElementById("btn-track-export")?.addEventListener("click", () => {
        fileManager.exportTrackFile();
      });
      document.getElementById("btn-track-delete")?.addEventListener("click", () => {
        deleteTrackFromTree();
      });

      /* EVENT CREATE / IMPORT / EXPORT */
      document.getElementById("btn-event-create")?.addEventListener("click", () => {
        createEntity("event");
      });
      document.getElementById("btn-event-import")?.addEventListener("click", () => {
        fileManager.importEventFile();
      });
      document.getElementById("btn-event-export")?.addEventListener("click", () => {
        fileManager.exportEventFile();
      });
      document.getElementById("btn-event-delete")?.addEventListener("click", () => {
        deleteEventFromTree();
      });

      /* SIMULATE */
      document.getElementById("btn-simulate")?.addEventListener("click", () => {
        openSimulateEventModal();
      });
      document.getElementById("simulateModalClose")?.addEventListener("click", () => {
        closeSimulateEventModal();
      });
      document.getElementById("simulateCancel")?.addEventListener("click", () => {
        closeSimulateEventModal();
      });
      document.getElementById("simulateSelectAll")?.addEventListener("click", () => {
        document.querySelectorAll('#simulateEventList input[type="checkbox"][data-event-id]').forEach((checkbox) => {
          checkbox.checked = true;
        });
        updateSimulateSelectionStatus();
      });
      document.getElementById("simulateClearAll")?.addEventListener("click", () => {
        document.querySelectorAll('#simulateEventList input[type="checkbox"][data-event-id]').forEach((checkbox) => {
          checkbox.checked = false;
        });
        updateSimulateSelectionStatus();
      });
      document.getElementById("simulateConfirm")?.addEventListener("click", () => {
        const selectedEvents = getSelectedSimulationEvents();
        if (selectedEvents.length === 0) {
          return;
        }
        closeSimulateEventModal();
        sendEventsToSolver(selectedEvents);
      });
      document.getElementById("simulateModalOverlay")?.addEventListener("click", (e) => {
        if (e.target === e.currentTarget) {
          closeSimulateEventModal();
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const overlay = document.getElementById("simulateModalOverlay");
          if (overlay?.classList.contains("is-open")) {
            closeSimulateEventModal();
          }
        }
      });

      /* ANALYSIS */
      document.getElementById("btn-table")?.addEventListener("click", () => {
        openAnalysisTab("Table");
      });
      document.getElementById("btn-line-graph")?.addEventListener("click", () => {
        openAnalysisTab("Line Graph");
      });
      document.getElementById("btn-scatter-plot")?.addEventListener("click", () => {
        openAnalysisTab("Scatter Plot");
      });
      document.getElementById("btn-surface-plot")?.addEventListener("click", () => {
        openAnalysisTab("Surface Plot");
      });
      document.getElementById("btn-track-map")?.addEventListener("click", () => {
        openAnalysisTab("Track Map");
      });

      /* OPTIONS: Preferences */
      document.getElementById("btn-preferences")?.addEventListener("click", () => {
        alert("Preferences clicked!");
      });
    }

    /********************************************************
     *           OPEN ANALYSIS TABS (TABLE, GRAPH, ETC.)
     ********************************************************/
    function openAnalysisTab(analysisType) {
      const tabId = `analysis-${currentTabId++}`;
      const tabHeaders = document.querySelector(".tab-headers");
      const tabContent = document.querySelector(".tab-content");

      const headerEl = document.createElement("div");
      headerEl.className = "tab-header";
      headerEl.setAttribute("data-tab-id", tabId);
      headerEl.innerHTML = `
        <span>${analysisType}</span>
        <span class="close-btn">x</span>
      `;

      const contentEl = document.createElement("div");
      contentEl.className = "tab-panel";
      contentEl.setAttribute("data-tab-id", tabId);
      contentEl.style.display = "none";
      contentEl.innerHTML = `
        <h2>${analysisType}</h2>
        <p>Analysis view goes here.</p>
      `;

      // Close button logic
      headerEl.querySelector(".close-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        closeTab(tabId);
      });
      // Activate on click
      headerEl.addEventListener("click", () => {
        setActiveTab(tabId);
      });

      tabHeaders.appendChild(headerEl);
      tabContent.appendChild(contentEl);

      tabs.push({ tabId, type: "analysis", analysisType, headerEl, contentEl });
      setActiveTab(tabId);
    }

    /********************************************************
     *                  INIT ON LOAD
     ********************************************************/
    document.addEventListener("DOMContentLoaded", () => {
      initProjectTree();
      initResizer();
      initToolbarActions();
      console.log("Lap Time Simulation Tool Initialized");
    });
  </script>
