<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChronoLap</title>

  <!-- (Optional) Plotly if you need it -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      background-color: #13171b;
      color: #d5d9df;
      font-size: 13px;
      letter-spacing: 0.01em;
    }

    /********************************************************
     *                     RIBBON TOOLBAR
     ********************************************************/
    #toolbar {
      width: 100%;
      background: linear-gradient(to bottom, #252a30, #1b1f26);
      border-bottom: 1px solid #2f3640;
      padding: 6px 12px;
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 12px;
    }

    .ribbon-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 8px;
      margin-right: 4px;
      border-right: 1px solid #2b323a;
    }
    .ribbon-group:last-of-type {
      border-right: none;
    }

    .ribbon-group-title {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.08em;
      color: #8ea0b5;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .ribbon-buttons {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .ribbon-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 0;
      cursor: pointer;
      border: 1px solid #2c313a;
      border-radius: 4px;
      padding: 4px 6px;
      background: linear-gradient(180deg, #1f2329 0%, #181c22 100%);
      box-shadow: inset 0 0 0 1px #20242b;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .ribbon-button img {
      width: 26px;
      height: 26px;
      margin-bottom: 4px;
      opacity: 0.88;
    }
    .ribbon-button span {
      font-size: 11px;
      color: #c0c7d0;
      letter-spacing: 0.02em;
    }
    .ribbon-button:hover {
      background: #242b34;
      border-color: #4da3ff;
      box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.25);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(9, 12, 16, 0.72);
      backdrop-filter: blur(3px);
      z-index: 1000;
      padding: 24px;
    }
    .modal-overlay.is-open {
      display: flex;
    }
    .modal-dialog {
      width: min(640px, 100%);
      max-height: min(720px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      background: #171d24;
      border: 1px solid #2f3843;
      border-radius: 3px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px 13px;
      border-bottom: 1px solid #2a313b;
      background: #1b2129;
    }
    .modal-title {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e8f0fb;
    }
    .modal-subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: #95a7ba;
    }
    .modal-close-btn {
      border: 1px solid #33404d;
      background: #1c222a;
      color: #c6d2df;
      width: 30px;
      height: 30px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      box-shadow: none;
    }
    .modal-close-btn:hover {
      border-color: #4da3ff;
      background: #202833;
      color: #ffffff;
    }
    .modal-body {
      padding: 16px 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .modal-toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .modal-status {
      font-size: 12px;
      color: #9fb1c4;
      letter-spacing: 0.02em;
    }
    .event-picker-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .event-picker-item {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid #2b323c;
      border-radius: 2px;
      background: #1b2129;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .event-picker-item:hover {
      border-color: #4da3ff;
      background: #202a35;
    }
    .event-picker-item input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: #4da3ff;
      cursor: pointer;
    }
    .event-picker-name {
      font-size: 13px;
      color: #eef4fb;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .event-picker-meta {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 11px;
      color: #92a6ba;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .event-picker-empty {
      padding: 18px;
      border: 1px dashed #34404d;
      border-radius: 2px;
      color: #8fa2b8;
      font-size: 12px;
      text-align: center;
      background: #1a2028;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 13px 16px 14px;
      border-top: 1px solid #2a313b;
      background: #181e25;
    }
    .modal-btn {
      border: 1px solid #33404d;
      background: #1e252d;
      color: #d7e2ed;
      padding: 8px 12px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: none;
      transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }
    .modal-btn:hover:not(:disabled) {
      border-color: #4da3ff;
      background: #232c36;
      color: #ffffff;
    }
    .modal-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .modal-btn.primary {
      background: #20486d;
      border-color: #4da3ff;
      color: #f4f9ff;
      box-shadow: none;
    }
    .modal-btn.primary:hover:not(:disabled) {
      background: #26557f;
    }

    /********************************************************
     *            MAIN CONTAINER (TREE + RESIZER + TABS)
     ********************************************************/
    #main-container {
      flex: 1;
      display: flex;
      min-height: 0; /* for proper flex scrolling */
    }

    /* PROJECT TREE */
    #project-tree {
      width: 250px;
      background-color: #1a1f26;
      border-right: 1px solid #2c333c;
      overflow-y: auto;
      padding: 10px;
      color: #c6ccd4;
      font-size: 12px;
    }

    /* SCROLLBARS */
    body::-webkit-scrollbar,
    #project-tree::-webkit-scrollbar,
    .vehicle-editor-left::-webkit-scrollbar,
    .vehicle-editor-right-tab::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    body::-webkit-scrollbar-track,
    #project-tree::-webkit-scrollbar-track,
    .vehicle-editor-left::-webkit-scrollbar-track,
    .vehicle-editor-right-tab::-webkit-scrollbar-track {
      background: #0f1318;
      border: 1px solid #1c222a;
    }
    body::-webkit-scrollbar-thumb,
    #project-tree::-webkit-scrollbar-thumb,
    .vehicle-editor-left::-webkit-scrollbar-thumb,
    .vehicle-editor-right-tab::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #2f3742 0%, #262d36 100%);
      border-radius: 6px;
      border: 1px solid #3b4652;
      box-shadow: inset 0 0 0 1px #1b1f26;
    }
    body::-webkit-scrollbar-thumb:hover,
    #project-tree::-webkit-scrollbar-thumb:hover,
    .vehicle-editor-left::-webkit-scrollbar-thumb:hover,
    .vehicle-editor-right-tab::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #3b4654 0%, #303946 100%);
      border-color: #4da3ff;
      box-shadow: inset 0 0 0 1px rgba(77, 163, 255, 0.25);
    }

    /* COLLAPSIBLE BRANCHES */
    #project-tree ul {
      list-style-type: none;
      margin-left: 0.8rem;
      padding-left: 0;
    }
    #project-tree .collapsible-branch {
      font-weight: bold;
      margin-top: 6px;
      margin-bottom: 4px;
      cursor: default;
      text-transform: uppercase;
      font-size: 11px;
      color: #8fa2b8;
      letter-spacing: 0.05em;
    }

    /* Toggle arrow for collapsing branches */
    .toggle-arrow {
      display: inline-block;
      width: 1rem;
      text-align: center;
      cursor: pointer;
      color: #6f8096;
      font-size: 13px;
      font-weight: 600;
    }

    /* Items in each branch */
    #project-tree li[data-id] {
      padding: 6px 8px;
      cursor: pointer;
      line-height: 1.3;
      border-left: 1px solid #252c34;
      border-bottom: 1px solid #1c222a;
      margin-left: 0;
      background-color: rgba(255,255,255,0.01);
    }
    #project-tree li[data-id]:hover {
      color: #ffffff;
      background-color: rgba(77, 163, 255, 0.08);
      border-left-color: #4da3ff;
    }
    #project-tree li.tree-selected {
      background-color: rgba(77, 163, 255, 0.14);
      border-left-color: #4da3ff;
      color: #ffffff;
    }

    /* RESIZER */
    #resizer {
      width: 5px;
      cursor: col-resize;
      background-color: #2c333c;
      box-shadow: inset 0 0 0 1px #1b1f26;
      position: relative;
    }
    #resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 24px;
      transform: translate(-50%, -50%);
      background: linear-gradient(#4da3ff, #7ac7ff);
      opacity: 0.6;
    }

    /* TAB GROUP */
    #tab-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-headers {
      background: linear-gradient(180deg, #1f242c 0%, #191d23 100%);
      display: flex;
      border-bottom: 1px solid #2f3640;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .tab-header {
      padding: 8px 12px;
      cursor: pointer;
      border-right: 1px solid #2c333c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-width: 100px;
      color: #9fb1c4;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .tab-header.active {
      background: #1c222b;
      font-weight: bold;
      color: #e8f0fb;
      box-shadow: inset 0 -2px 0 #4da3ff;
    }
    .tab-header .close-btn {
      margin-left: 10px;
      color: #b53a3a;
      font-weight: bold;
    }

    .tab-content {
      flex: 1;
      padding: 0; /* Removed padding to allow full usage */
      overflow: auto;
      background-color: #0f1318;
    }

    .tab-panel {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: none; /* hidden by default, shown when active */
      color: #d5d9df;
      background-color: #0f1318;
      padding: 12px;
    }

    /********************************************************
     *   VEHICLE EDITOR (LEFT/RIGHT + 4 SUBTABS) MODIFICATIONS
     ********************************************************/
    .vehicle-editor-container {
      display: flex;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border: 1px solid #2c333c;
      background-color: #11161c;
      color: #d5d9df;
      box-shadow: inset 0 0 0 1px #131820;
    }

    .vehicle-editor-left {
      width: 25%;
      background-color: #161c22;
      overflow-y: auto;
      height: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-right: 1px solid #232a32;
    }

    .vehicle-editor-resizer {
      width: 5px;
      cursor: col-resize;
      background-color: #2c333c;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px #1b1f26;
      position: relative;
    }
    .vehicle-editor-resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 24px;
      transform: translate(-50%, -50%);
      background: linear-gradient(#4da3ff, #7ac7ff);
      opacity: 0.6;
    }

    .vehicle-editor-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: #1e1e1e;
      min-width: 0;
      overflow: hidden;
    }

    .vehicle-editor-tab-headers {
      display: flex;
      background: linear-gradient(180deg, #1f242c 0%, #191d23 100%);
      border-bottom: 1px solid #2f3640;
    }
    .vehicle-editor-tab-header {
      padding: 8px 12px;
      cursor: pointer;
      border-right: 1px solid #2c333c;
      color: #9fb1c4;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 12px;
      background-color: #181e26;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .vehicle-editor-tab-header.active {
      background-color: #10151b;
      font-weight: bold;
      color: #e8f0fb;
      box-shadow: inset 0 -2px 0 #4da3ff;
    }

    .vehicle-editor-tab-content {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-color: #1e1e1e;
      color: #cccccc;
      min-width: 0;
    }

    .vehicle-editor-right-tab {
      display: none;
      padding: 10px;
      height: 100%;
      box-sizing: border-box;
      background-color: #0f1318;
      color: #d5d9df;
    }
    .vehicle-editor-right-tab.active {
      display: block;
    }

    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 5px 6px;
      font-size: 13px;
      color: #e6ebf2;
      background-color: #161b23;
      border: 1px solid #2c333c;
      border-radius: 3px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4da3ff;
      box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.35);
    }

    .form-section {
      border: 1px solid #2c333c;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 15px;
      background-color: #181e26;
      box-shadow: inset 0 0 0 1px #12171e;
    }
    .form-section h4 {
      margin-bottom: 8px;
      font-size: 13px;
      background-color: #1f252d;
      padding: 4px 6px;
      border-radius: 2px;
      border: 1px solid #2c333c;
      color: #e6ebf2;
    }

    /* Powertrain table */
    .powertrain-table-wrapper {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #2c333c;
      border-radius: 4px;
      background: #0f1318;
      box-shadow: inset 0 0 0 1px #12171e;
    }
    .powertrain-table {
      border-collapse: collapse;
      width: 100%;
      background-color: #0f1318;
      color: #d5d9df;
    }
    .powertrain-table th,
    .powertrain-table td {
      border: 1px solid #2c333c;
      padding: 6px;
      font-size: 12px;
      text-align: left;
      background-color: #131821;
      min-width: 120px;
    }
    .powertrain-table th {
      background-color: #1c222b;
      color: #e6ebf2;
      letter-spacing: 0.04em;
    }
    .table-actions {
      display: flex;
      gap: 6px;
      margin: 6px 0;
    }
    .mini-btn {
      padding: 4px 8px;
      background: linear-gradient(180deg, #1f2329 0%, #181c22 100%);
      border: 1px solid #2c313a;
      border-radius: 4px;
      color: #c0c7d0;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .mini-btn:hover {
      background: #242b34;
      border-color: #4da3ff;
      box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.25);
    }
    .powertrain-cell {
      outline: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .powertrain-cell:focus {
      background-color: #1b222d;
      box-shadow: inset 0 0 0 1px #4da3ff;
    }
    .powertrain-table-wrapper::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .powertrain-table-wrapper::-webkit-scrollbar-track {
      background: #0f1318;
      border: 1px solid #1c222a;
    }
    .powertrain-table-wrapper::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #2f3742 0%, #262d36 100%);
      border-radius: 6px;
      border: 1px solid #3b4652;
      box-shadow: inset 0 0 0 1px #1b1f26;
    }
    .powertrain-table-wrapper::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #3b4654 0%, #303946 100%);
      border-color: #4da3ff;
      box-shadow: inset 0 0 0 1px rgba(77, 163, 255, 0.25);
    }

    .track-editor-summary {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .track-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 8px;
      border: 1px solid #2c333c;
      border-radius: 4px;
      background: #131821;
      color: #cbd5df;
      font-size: 12px;
    }
    .track-summary-row strong {
      color: #e8f0fb;
      font-weight: 600;
    }
    .track-plot-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .track-plot-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
      min-height: 0;
    }
    .track-plot-canvas-wrap {
      flex: 1;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 1px solid #2c333c;
      border-radius: 4px;
      background: #131821;
      box-shadow: inset 0 0 0 1px #12171e;
    }
    .track-plot-square {
      position: relative;
      width: min(100%, calc(100vh - 250px));
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
    }
    .track-plot-square canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }
    .track-elevation-legend {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #2c333c;
      border-radius: 4px;
      background: #181e26;
      box-shadow: inset 0 0 0 1px #12171e;
      color: #c0c7d0;
      font-size: 12px;
    }
    .track-elevation-bar {
      height: 10px;
      border-radius: 999px;
      border: 1px solid #2c333c;
      background: linear-gradient(90deg, #2d7ff9 0%, #3cc7d7 30%, #8fd85a 60%, #ffd166 82%, #ff6b6b 100%);
      box-shadow: inset 0 0 0 1px rgba(15, 19, 24, 0.6);
    }
    .track-elevation-label {
      color: #e8f0fb;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .track-plot-controls {
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }
    .track-view-status {
      margin-left: auto;
      color: #9fb1c4;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .track-table-actions {
      flex-wrap: wrap;
      align-items: center;
    }
    .track-table-status {
      margin-left: auto;
      color: #9fb1c4;
      font-size: 11px;
      letter-spacing: 0.02em;
    }
    .track-table-status.compact {
      margin-left: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- RIBBON TOOLBAR -->
  <div id="toolbar">
    <!-- VEHICLE GROUP -->
    <div class="ribbon-group">
      <div class="ribbon-group-title">Vehicle</div>
      <div class="ribbon-buttons">
        <div class="ribbon-button" id="btn-vehicle-create">
          <img src="../assets/ChronoTrace/vehicle.png" alt="Create" />
          <span>Create</span>
        </div>
        <div class="ribbon-button" id="btn-vehicle-import">
          <img src="../assets/ChronoTrace/vehicle.png" alt="Import" />
          <span>Import</span>
        </div>
        <div class="ribbon-button" id="btn-vehicle-export">
          <img src="../assets/ChronoTrace/vehicle.png" alt="Export" />
          <span>Export</span>
        </div>
        <div class="ribbon-button" id="btn-vehicle-delete">
          <img src="../assets/ChronoTrace/vehicle.png" alt="Delete" />
          <span>Delete</span>
        </div>
      </div>
    </div>

    <!-- TRACK GROUP -->
    <div class="ribbon-group">
      <div class="ribbon-group-title">Track</div>
      <div class="ribbon-buttons">

    function refreshTractiveChart(id) {
      const chart = tractiveCharts.get(id);
      if (chart) {
        const vehicle = vehicles.find(v => v.id === id);
        ensureSpecDefaults(vehicle);
        const curves = computeTractiveCurves(vehicle);
        chart.data.datasets = buildTractiveDatasets(curves);
        chart.options.scales.x.max = curves.maxSpeed;
        chart.update("none");
      }
      refreshGGVChart(id);
    }
    const tractiveAnnotPlugin = {
      id: "tractiveAnnot",
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const area = chart.chartArea;
        const datasets = chart.data.datasets;
        const calloutTargets = datasets
          .map((ds, idx) => ({ ds, idx }))
          .filter(({ ds }) => ["Max Velocity", "Grip Intersection", "Gear Change"].includes(ds.label));

        calloutTargets.forEach(({ ds, idx }) => {
          const meta = chart.getDatasetMeta(idx);
          if (!meta || meta.hidden || !chart.isDatasetVisible(idx) || !meta.data || meta.data.length === 0) return;
          meta.data.forEach((pt, i) => {
            const { x, y } = pt.getProps(["x", "y"], true);
            const fontStr = "10px 'IBM Plex Sans', 'Segoe UI', sans-serif";
            ctx.font = fontStr;
            const dy = ds.label === "Max Velocity" ? -18 : -12;
            const isVmax = ds.label === "Max Velocity";
            const text =
              ds.label === "Max Velocity"
                ? `Vmax ${(ds.data[i]?.x ?? 0).toFixed(1)} m/s`
                : ds.label === "Grip Intersection"
                  ? `Traction=Grip @ ${(ds.data[i]?.x ?? 0).toFixed(1)} m/s`
                  : `Shift @ ${(ds.data[i]?.x ?? 0).toFixed(1)} m/s`;
            const textWidth = Math.ceil(ctx.measureText(text).width);
            const pad = 6;
            let tx;
            let ty = y + dy;
            if (isVmax) {
              tx = x - textWidth - 16; // text to NW
              const minTx = area.left + pad;
              tx = Math.max(tx, minTx);
            } else {
              tx = x + 16; // text to NE
              const maxTx = area.right - textWidth - 16;
              tx = Math.min(Math.max(tx, area.left + pad), maxTx);
            }
            ty = Math.min(Math.max(ty, area.top + pad), area.bottom - pad);
            const lineEndX = isVmax
              ? Math.min(Math.max(tx + textWidth + 6, area.left + pad), area.right - pad) // right side of text
              : Math.max(Math.min(tx - 6, area.right - pad), area.left + pad); // left side of text
            const lineEndY = ty;

            ctx.save();
            ctx.strokeStyle = "#e8f0fb";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo((x + lineEndX) / 2, (y + lineEndY) / 2);
            ctx.lineTo(lineEndX, lineEndY);
            ctx.stroke();

            ctx.fillStyle = ds.label === "Gear Change" ? "#ffd166" : ds.label === "Grip Intersection" ? "#9be070" : "#e8f0fb";
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = "rgba(0,0,0,0.6)";
            ctx.lineWidth = 3;
            ctx.font = "10px 'IBM Plex Sans', 'Segoe UI', sans-serif";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.strokeText(text, tx, ty);
            ctx.fillStyle = "#e8f0fb";
            ctx.fillText(text, tx, ty);
            ctx.restore();
          });
        });
      }
    };
    const slipPatternPlugin = {
      id: "slipPattern",
      afterDatasetsDraw(chart) {
        const slipIdx = chart.data.datasets.findIndex(ds => ds.label === "Grip Limited Region");
        if (slipIdx !== -1) {
          const metaSlip = chart.getDatasetMeta(slipIdx);
          if (metaSlip.hidden || !chart.isDatasetVisible(slipIdx)) return;
        }
        const tIdx = chart.data.datasets.findIndex(ds => ds.label === "Tractive Force");
        const gIdx = chart.data.datasets.findIndex(ds => ds.label === "Grip Limit");
        if (tIdx === -1 || gIdx === -1) return;
        const tMeta = chart.getDatasetMeta(tIdx);
        const gMeta = chart.getDatasetMeta(gIdx);
        if (!tMeta.data || !gMeta.data || tMeta.data.length !== gMeta.data.length) return;
        const valuesT = chart.data.datasets[tIdx].data.map(pt => typeof pt === "number" ? pt : pt.y);
        const valuesG = chart.data.datasets[gIdx].data.map(pt => typeof pt === "number" ? pt : pt.y);
        const ctx = chart.ctx;
        const spacing = 6;
        const n = Math.min(valuesT.length, valuesG.length) - 1;
        for (let i = 0; i < n; i++) {
          const t1 = valuesT[i], t2 = valuesT[i + 1];
          const g1 = valuesG[i], g2 = valuesG[i + 1];
          const x1 = tMeta.data[i].x;
          const x2 = tMeta.data[i + 1].x;
          const y1t = tMeta.data[i].y, y2t = tMeta.data[i + 1].y;
          const y1g = gMeta.data[i].y, y2g = gMeta.data[i + 1].y;
          const d1 = t1 - g1;
          const d2 = t2 - g2;
          if (d1 <= 0 && d2 <= 0) continue;
          let poly = [];
          if (d1 > 0 && d2 > 0) {
            poly = [
              [x1, y1t], [x2, y2t],
              [x2, y2g], [x1, y1g]
            ];
          } else {
            const f = d1 / (d1 - d2);
            const xC = x1 + (x2 - x1) * f;
            const yCGrip = y1g + (y2g - y1g) * f;
            const yCTrac = y1t + (y2t - y1t) * f;
            if (d1 > 0 && d2 <= 0) {
              poly = [
                [x1, y1t], [xC, yCTrac],
                [xC, yCGrip], [x1, y1g]
              ];
            } else if (d1 <= 0 && d2 > 0) {
              poly = [
                [xC, yCTrac], [x2, y2t],
                [x2, y2g], [xC, yCGrip]
              ];
            }
          }
          if (poly.length === 0) continue;
          const area = chart.chartArea;
          ctx.save();
          ctx.beginPath();
          poly.forEach(([px, py], idx) => {
            const cx = Math.min(Math.max(px, area.left), area.right);
            const cy = Math.min(Math.max(py, area.top), area.bottom);
            if (idx === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
          });
          ctx.closePath();
          ctx.clip();
          ctx.strokeStyle = "rgba(232,240,251,0.9)";
          ctx.lineWidth = 1;
          const minX = Math.min(...poly.map(p => p[0]));
          const maxX = Math.max(...poly.map(p => p[0]));
          const minY = Math.min(...poly.map(p => p[1]));
          const maxY = Math.max(...poly.map(p => p[1]));
          const diag = maxY - minY + 12;
          for (let x = minX - diag; x < maxX + diag; x += spacing) {
            ctx.beginPath();
            ctx.moveTo(x, maxY);
            ctx.lineTo(x + diag, minY);
            ctx.stroke();
          }
          ctx.restore();
        }
      }
    };

    function refreshGGVChart(id) {
      const chart = ggvCharts.get(id);
      if (!chart) return;
      const vehicle = vehicles.find(v => v.id === id);
      const { ellipses, maxAbs } = computeGGVEllipses(vehicle);
      chart.data.datasets = buildGGVDatasets(ellipses);
      const pad = maxAbs * 1.1;
      chart.options.scales.x.suggestedMin = -pad;
      chart.options.scales.x.suggestedMax = pad;
      chart.options.scales.y.suggestedMin = -pad;
      chart.options.scales.y.suggestedMax = pad;
      chart.update("none");
    }

        type: "line",
        data: { datasets: buildGGVDatasets(ellipses) },

          parsing: false,

          }
        }
      });
      ggvCharts.set(id, chart);
    }

    function getUsedEntityIds() {
      return new Set([
        ...vehicles.map(vehicle => vehicle.id),
        ...tracks.map(track => track.id),
        ...eventsArray.map(eventObj => eventObj.id)
      ]);
    }

    function allocateEntityId(preferredId = null) {
      const usedIds = getUsedEntityIds();
      const preferredNumeric = Number(preferredId);
      if (Number.isInteger(preferredNumeric) && preferredNumeric > 0 && !usedIds.has(preferredNumeric)) {
        return preferredNumeric;
      }
      let candidate = Date.now();
      while (usedIds.has(candidate)) {
        candidate += 1;
      }
      return candidate;
    }

    function applyEntityDefaults(type, entity) {
      if (type === "vehicle") {
        ensureSpecDefaults(entity);
      } else if (type === "track") {
        TrackEditor.ensureDefaults(entity);
      } else if (type === "event") {
        ensureEventDefaults(entity);
      }
    }

    }

    function inferXmlTableColumns(value) {
      if (!Array.isArray(value) || value.length === 0) return null;
      const populatedItems = value.filter(item => item !== null && item !== undefined);
      if (populatedItems.length === 0) return null;
      if (populatedItems.every(item => !isPlainObject(item))) {
        return ["value"];
      }

      const firstObject = populatedItems.find(item => isPlainObject(item));
      if (!firstObject) return null;
      const columns = Object.keys(firstObject);
      if (columns.length === 0) return null;

      const isUniform = populatedItems.every((item) => {
        if (!isPlainObject(item)) return false;
        const itemKeys = Object.keys(item);
        return itemKeys.length === columns.length && columns.every((column, idx) => itemKeys[idx] === column);
      });
      return isUniform ? columns : null;
    }

    function getXmlTableColumns(path, value) {
      return XML_TABLE_COLUMN_OVERRIDES[path] || inferXmlTableColumns(value);
    }

    function stringifyXmlScalar(value) {
      if (value === null || value === undefined) return "";
      return `${value}`;
    }

    function buildXmlTableText(value, columns) {
      return value.map((item) => {
        const rowValues = columns.length === 1 && !isPlainObject(item)
          ? [item]
          : columns.map(column => item?.[column]);
        return rowValues.map(cellValue => stringifyXmlScalar(cellValue)).join(" ");
      }).join("\n");
    }

    function parseXmlScalar(text) {
      const trimmed = `${text ?? ""}`.trim();
      if (trimmed === "") return "";
      if (trimmed.toLowerCase() === "true") return true;
      if (trimmed.toLowerCase() === "false") return false;
      const numericVal = parseFloat(trimmed);
      if (!Number.isNaN(numericVal) && `${numericVal}` === trimmed.replace(/\.0+$/, match => match === ".0" ? "" : match)) {
        return numericVal;
      }
      if (!Number.isNaN(numericVal) && /^[-+]?\d*\.?\d+(e[-+]?\d+)?$/i.test(trimmed)) {
        return numericVal;
      }
      return trimmed;
    }

    function parseXmlTableText(node, columns) {
      const delimiter = (node.getAttribute("delimiter") || "whitespace").toLowerCase();
      const rawText = node.textContent || "";
      const lines = rawText
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(line => line.length > 0);
      const splitPattern = delimiter === "tab" ? /\t/ : /\s+/;
      const rows = lines.map(line => line.split(splitPattern).map(cell => parseXmlScalar(cell)));
      if (columns.length === 1 && columns[0] === "value") {
        return rows.map(row => row[0] ?? "");
      }
      return rows.map((row) => {
        const rowObj = {};
        columns.forEach((column, idx) => {
          rowObj[column] = row[idx] ?? "";
        });
        return rowObj;
      });
    }

    function exportVehicleSpecToXmlShape(spec) {
      const source = isPlainObject(spec) ? spec : {};
      const grouped = {};
      VEHICLE_XML_BRANCHES.forEach(({ key, props }) => {
        grouped[key] = {};
        props.forEach((prop) => {
          if (source[prop] !== undefined) {
            grouped[key][prop] = source[prop];
          }
        });
      });
      Object.keys(source).forEach((prop) => {
        const covered = VEHICLE_XML_BRANCHES.some(branch => branch.props.includes(prop));
        if (!covered) {
          grouped[prop] = source[prop];
        }
      });
      return grouped;
    }

    function importVehicleSpecFromXmlShape(spec) {
      if (!isPlainObject(spec)) return spec;
      const flattened = {};
      Object.entries(spec).forEach(([key, value]) => {
        const branch = VEHICLE_XML_BRANCHES.find(entry => entry.key === key);
        if (branch && isPlainObject(value)) {
          Object.assign(flattened, value);
        } else {
          flattened[key] = value;
        }
      });
      return flattened;
    }

    function exportSpecForXml(type, spec) {
      if (type === "vehicle") {
        return exportVehicleSpecToXmlShape(spec);
      }
      return spec;
    }

    function importSpecFromXml(type, spec) {
      if (type === "vehicle") {
        return importVehicleSpecFromXmlShape(spec);
      }
      return spec;
    }

    function appendXmlValue(doc, parent, key, value, path = key) {
      const node = doc.createElement(key);
      if (Array.isArray(value)) {
        const columns = getXmlTableColumns(path, value);
        if (columns) {
          node.setAttribute("type", "table");
          node.setAttribute("columns", columns.join(","));
          node.setAttribute("delimiter", "whitespace");
          node.appendChild(doc.createCDATASection(`\n${buildXmlTableText(value, columns)}\n`));
        } else {
          node.setAttribute("type", "array");
          value.forEach((item, idx) => appendXmlValue(doc, node, "item", item, `${path}[${idx}]`));
        }
      } else if (value === null || value === undefined) {
        node.setAttribute("type", "null");
      } else if (typeof value === "object") {
        node.setAttribute("type", "object");
        Object.entries(value).forEach(([childKey, childValue]) => appendXmlValue(doc, node, childKey, childValue, `${path}.${childKey}`));
      } else {
        const valueType = typeof value === "number" ? "number" : typeof value === "boolean" ? "boolean" : "string";
        node.setAttribute("type", valueType);
        node.textContent = `${value}`;
      }
      parent.appendChild(node);
    }

    function parseXmlValue(node) {
      const nodeType = node.getAttribute("type") || (node.children.length > 0 ? "object" : "string");
      if (nodeType === "table") {
        const columns = (node.getAttribute("columns") || "")
          .split(",")
          .map(column => column.trim())
          .filter(Boolean);
        const rowNodes = Array.from(node.children).filter(child => child.nodeName === "row");
        if (rowNodes.length > 0) {
          const rows = rowNodes.map(row => Array.from(row.children).filter(child => child.nodeName === "c").map(cell => parseXmlValue(cell)));
          if (columns.length === 1 && columns[0] === "value") {
            return rows.map(row => row[0] ?? "");
          }
          return rows.map((row) => {
            const rowObj = {};
            columns.forEach((column, idx) => {
              rowObj[column] = row[idx] ?? "";
            });
            return rowObj;
          });
        }
        return parseXmlTableText(node, columns);
      }
      if (nodeType === "array") {
        return Array.from(node.children).map(child => parseXmlValue(child));
      }
      if (nodeType === "object") {
        const value = {};
        Array.from(node.children).forEach((child) => {
          value[child.nodeName] = parseXmlValue(child);
        });
        return value;
      }
      if (nodeType === "number") {
        const numericVal = parseFloat(node.textContent || "");
        return Number.isNaN(numericVal) ? 0 : numericVal;
      }
      if (nodeType === "boolean") {
        return (node.textContent || "").trim().toLowerCase() === "true";
      }
      if (nodeType === "null") {
        return null;
      }
      return node.textContent || "";
    }

    function escapeXmlText(value) {
      return `${value ?? ""}`
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeXmlAttribute(value) {
      return escapeXmlText(value).replace(/"/g, "&quot;");
    }

    function serializeXmlNode(node, indent = "") {
      if (node.nodeType === Node.CDATA_SECTION_NODE) {
        return `<![CDATA[${node.data}]]>`;
      }
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent || "";
        return text.trim().length === 0 ? "" : escapeXmlText(text);
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const tagName = node.nodeName;
      const attrs = Array.from(node.attributes || [])
        .map(attr => ` ${attr.name}="${escapeXmlAttribute(attr.value)}"`)
        .join("");
      const childNodes = Array.from(node.childNodes || []).filter((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          return (child.textContent || "").trim().length > 0;
        }
        return child.nodeType === Node.ELEMENT_NODE || child.nodeType === Node.CDATA_SECTION_NODE;
      });

      if (childNodes.length === 0) {
        return `${indent}<${tagName}${attrs}/>`;
      }

      if (childNodes.length === 1 && childNodes[0].nodeType === Node.TEXT_NODE) {
        return `${indent}<${tagName}${attrs}>${escapeXmlText(childNodes[0].textContent || "")}</${tagName}>`;
      }

      if (childNodes.length === 1 && childNodes[0].nodeType === Node.CDATA_SECTION_NODE) {
        return `${indent}<${tagName}${attrs}>\n${serializeXmlNode(childNodes[0])}\n${indent}</${tagName}>`;
      }

      const childIndent = `${indent}  `;
      const content = childNodes
        .map(child => serializeXmlNode(child, child.nodeType === Node.ELEMENT_NODE ? childIndent : ""))
        .filter(Boolean)
        .join("\n");
      return `${indent}<${tagName}${attrs}>\n${content}\n${indent}</${tagName}>`;
    }

    function createJsonValue(value, unit) {
      return { value, unit };
    }

    function createJsonData(data, unit, columns = null) {
      const result = { data, unit };
      if (columns) {
        result.columns = columns;
      }
      return result;
    }

    function getJsonValue(node, fallback = "") {
      if (node === undefined || node === null) return fallback;
      if (isPlainObject(node) && Object.prototype.hasOwnProperty.call(node, "value")) {
        return node.value;
      }
      return node;
    }

    function getJsonData(node, fallback = []) {
      if (node === undefined || node === null) return fallback;
      if (isPlainObject(node) && Array.isArray(node.data)) {
        return node.data;
      }
      if (Array.isArray(node)) {
        return node;
      }
      return fallback;
    }

    function normalizeNumericValue(value, fallback = "") {
      if (value === undefined || value === null || value === "") return fallback;
      const numericVal = Number(value);
      return Number.isFinite(numericVal) ? numericVal : fallback;
    }

    function buildVehicleJson(entity) {
      ensureSpecDefaults(entity);
      const spec = entity.spec || cloneDefaultSpec();
      const engineData = Array.isArray(spec.engineData) ? spec.engineData : [];
      return {
        vehicle: {
          meta: {
            id: entity.id,
            name: entity.name || ""
          },
          aerodynamics: {
            drag: createJsonValue(spec.dragCoefficient, "unitless"),
            lift: createJsonValue(spec.liftCoefficient, "unitless"),
            frontalArea: createJsonValue(spec.frontalArea, "m2")
          },
          chassis: {
            mass: createJsonValue(spec.weight, "kg")
          },
          drivetrain: {
            type: createJsonValue(spec.drivetrainType, "unitless"),
            gears: createJsonData(Array.isArray(spec.gearRatios) ? spec.gearRatios : [], "ratio"),
            final: createJsonValue(spec.finalDriveRatio, "ratio"),
            efficiency: createJsonValue(spec.driveEfficiency, "ratio")
          },
          powertrain: {
            motor: {
              speed: createJsonData(engineData.map(row => row.rpm ?? ""), "rpm"),
              torque: createJsonData(engineData.map(row => row.torque ?? ""), "Nm")
            },
            fuel: {
              energyDensity: createJsonValue((Number(spec.fuelEnergyDensity) || 0) / 1000000, "MJ/kg")
            },
            efficiency: createJsonValue(spec.thermalEfficiency, "ratio")
          },
          tyres: {
            friction: {
              lateral: createJsonValue(spec.latFriction, "unitless"),
              longitudinal: createJsonValue(spec.longFriction, "unitless")
            },
            radius: createJsonValue(spec.tireRadius, "m"),
            resistance: createJsonValue(spec.rollingResistance, "unitless")
          }
        }
      };
    }

    function parseVehicleJson(payload) {
      const root = payload?.vehicle || payload || {};
      const meta = root.meta || {};
      const speedNode = root.powertrain?.motor?.speed;
      const speedUnit = `${speedNode?.unit || "rpm"}`.toLowerCase();
      const speedScale = speedUnit === "rad/s" ? (60 / (2 * Math.PI)) : 1;
      const speedData = getJsonData(speedNode).map(value => normalizeNumericValue(value));
      const torqueData = getJsonData(root.powertrain?.motor?.torque).map(value => normalizeNumericValue(value));
      const pointCount = Math.max(speedData.length, torqueData.length);
      const engineData = pointCount > 0
        ? Array.from({ length: pointCount }, (_, idx) => {
            const rpmValue = normalizeNumericValue(speedData[idx], "");
            return {
              rpm: rpmValue === "" ? "" : rpmValue * speedScale,
              torque: normalizeNumericValue(torqueData[idx], "")
            };
          })
        : cloneDefaultSpec().engineData;

      const energyNode = root.powertrain?.fuel?.energyDensity;
      const energyUnit = `${energyNode?.unit || "J/kg"}`.toLowerCase();
      const energyDensityRaw = normalizeNumericValue(getJsonValue(energyNode, cloneDefaultSpec().fuelEnergyDensity), cloneDefaultSpec().fuelEnergyDensity);
      const fuelEnergyDensity = energyUnit === "mj/kg" ? energyDensityRaw * 1000000 : energyDensityRaw;

      return {
        id: allocateEntityId(meta.id),
        name: meta.name || ENTITY_CONFIG.vehicle.importName,
        spec: {
          weight: normalizeNumericValue(getJsonValue(root.chassis?.mass, cloneDefaultSpec().weight), cloneDefaultSpec().weight),
          dragCoefficient: normalizeNumericValue(getJsonValue(root.aerodynamics?.drag, cloneDefaultSpec().dragCoefficient), cloneDefaultSpec().dragCoefficient),
          liftCoefficient: normalizeNumericValue(getJsonValue(root.aerodynamics?.lift, cloneDefaultSpec().liftCoefficient), cloneDefaultSpec().liftCoefficient),
          frontalArea: normalizeNumericValue(getJsonValue(root.aerodynamics?.frontalArea, cloneDefaultSpec().frontalArea), cloneDefaultSpec().frontalArea),
          tireRadius: normalizeNumericValue(getJsonValue(root.tyres?.radius, cloneDefaultSpec().tireRadius), cloneDefaultSpec().tireRadius),
          rollingResistance: normalizeNumericValue(getJsonValue(root.tyres?.resistance, cloneDefaultSpec().rollingResistance), cloneDefaultSpec().rollingResistance),
          longFriction: normalizeNumericValue(getJsonValue(root.tyres?.friction?.longitudinal, cloneDefaultSpec().longFriction), cloneDefaultSpec().longFriction),
          latFriction: normalizeNumericValue(getJsonValue(root.tyres?.friction?.lateral, cloneDefaultSpec().latFriction), cloneDefaultSpec().latFriction),
          drivetrainType: `${getJsonValue(root.drivetrain?.type, cloneDefaultSpec().drivetrainType) || cloneDefaultSpec().drivetrainType}`,
          finalDriveRatio: normalizeNumericValue(getJsonValue(root.drivetrain?.final, cloneDefaultSpec().finalDriveRatio), cloneDefaultSpec().finalDriveRatio),
          driveEfficiency: normalizeNumericValue(getJsonValue(root.drivetrain?.efficiency, cloneDefaultSpec().driveEfficiency), cloneDefaultSpec().driveEfficiency),
          thermalEfficiency: normalizeNumericValue(getJsonValue(root.powertrain?.efficiency, cloneDefaultSpec().thermalEfficiency), cloneDefaultSpec().thermalEfficiency),
          fuelEnergyDensity,
          engineData,
          gearRatios: getJsonData(root.drivetrain?.gears, cloneDefaultSpec().gearRatios)
            .map(value => normalizeNumericValue(value, ""))
            .filter(value => value !== "")
        }
      };
    }

    function buildTrackJson(entity) {
      TrackEditor.ensureDefaults(entity);
      const spec = entity.spec || cloneDefaultTrackSpec();
      return {
        track: {
          meta: {
            id: entity.id,
            name: entity.name || ""
          },
          layout: {
            circuitType: createJsonValue(spec.circuitType, "unitless"),
            coordinates: createJsonData(
              (Array.isArray(spec.points) ? spec.points : []).map(point => [point.x ?? "", point.y ?? "", point.z ?? ""]),
              "m",
              ["x", "y", "z"]
            )
          }
        }
      };
    }

    function parseTrackJson(payload) {
      const root = payload?.track || payload || {};
      const meta = root.meta || {};
      const coordinatesNode = root.layout?.coordinates;
      const pointsData = getJsonData(coordinatesNode, []);
      const points = pointsData.length > 0
        ? pointsData.map((row) => {
            const cells = Array.isArray(row) ? row : [row?.x, row?.y, row?.z];
            return {
              x: normalizeNumericValue(cells[0], ""),
              y: normalizeNumericValue(cells[1], ""),
              z: normalizeNumericValue(cells[2], "")
            };
          })
        : cloneDefaultTrackSpec().points;
      return {
        id: allocateEntityId(meta.id),
        name: meta.name || ENTITY_CONFIG.track.importName,
        spec: {
          circuitType: `${getJsonValue(root.layout?.circuitType, cloneDefaultTrackSpec().circuitType) || cloneDefaultTrackSpec().circuitType}`,
          points
        }
      };
    }

    function buildEventJson(entity) {
      ensureEventDefaults(entity);
      const spec = entity.spec || cloneDefaultEventSpec();
      return {
        event: {
          meta: {
            id: entity.id,
            name: entity.name || ""
          },
          references: {
            vehicleId: createJsonValue(spec.vehicleId, "id"),
            trackId: createJsonValue(spec.trackId, "id")
          },
          ambient: {
            airTemperature: createJsonValue(spec.airTemperature, "C"),
            airPressure: createJsonValue(spec.airPressure, "kPa"),
            elevation: createJsonValue(spec.elevation, "m"),
            humidity: createJsonValue(spec.humidity, "%")
          }
        }
      };
    }

    function parseEventJson(payload) {
      const root = payload?.event || payload || {};
      const meta = root.meta || {};
      const vehicleId = getJsonValue(root.references?.vehicleId, "");
      const trackId = getJsonValue(root.references?.trackId, "");
      return {
        id: allocateEntityId(meta.id),
        name: meta.name || ENTITY_CONFIG.event.importName,
        spec: {
          vehicleId: vehicleId === "" || vehicleId === null || vehicleId === undefined ? "" : parseInt(vehicleId, 10),
          trackId: trackId === "" || trackId === null || trackId === undefined ? "" : parseInt(trackId, 10),
          airTemperature: normalizeNumericValue(getJsonValue(root.ambient?.airTemperature, cloneDefaultEventSpec().airTemperature), cloneDefaultEventSpec().airTemperature),
          airPressure: normalizeNumericValue(getJsonValue(root.ambient?.airPressure, cloneDefaultEventSpec().airPressure), cloneDefaultEventSpec().airPressure),
          elevation: normalizeNumericValue(getJsonValue(root.ambient?.elevation, cloneDefaultEventSpec().elevation), cloneDefaultEventSpec().elevation),
          humidity: normalizeNumericValue(getJsonValue(root.ambient?.humidity, cloneDefaultEventSpec().humidity), cloneDefaultEventSpec().humidity)
        }
      };
    }

    function buildEntityJson(type, entity) {
      if (type === "vehicle") return buildVehicleJson(entity);
      if (type === "track") return buildTrackJson(entity);
      if (type === "event") return buildEventJson(entity);
      return {};
    }

    function parseEntityJson(type, jsonText) {
      const payload = JSON.parse(jsonText);
      if (type === "vehicle") return parseVehicleJson(payload);
      if (type === "track") return parseTrackJson(payload);
      if (type === "event") return parseEventJson(payload);
      throw new Error(`Unsupported entity type: ${type}`);
    }

    function buildEntityXml(type, entity) {
      const config = ENTITY_CONFIG[type];
      const doc = document.implementation.createDocument("", config.exportTag, null);
      const root = doc.documentElement;
      root.setAttribute("type", type);
      root.setAttribute("version", "4");
      root.setAttribute("id", `${entity.id}`);
      root.setAttribute("name", entity.name || "");
      if (entity.spec !== undefined) {
        appendXmlValue(doc, root, "spec", exportSpecForXml(type, entity.spec), "spec");
      }
      return `<?xml version="1.0" encoding="UTF-8"?>\n${serializeXmlNode(root)}`;
    }

    function parseEntityXml(type, xmlText) {
      const config = ENTITY_CONFIG[type];
      const doc = new DOMParser().parseFromString(xmlText, "application/xml");
      const parseError = doc.querySelector("parsererror");
      if (parseError) {
        throw new Error("The XML file could not be parsed.");
      }

      const root = doc.documentElement;
      if (!root || root.nodeName !== config.exportTag) {
        throw new Error(`Expected a <${config.exportTag}> root element.`);
      }

      const entity = {
        id: allocateEntityId(root.getAttribute("id")),
        name: root.getAttribute("name") || config.importName
      };
      const specNode = Array.from(root.children).find(child => child.nodeName === "spec");
      entity.spec = specNode ? importSpecFromXml(type, parseXmlValue(specNode)) : config.cloneSpec();
      applyEntityDefaults(type, entity);
      return entity;
    }

    function getActiveTabEntity(type) {
      const activeTab = tabs.find(tab => tab.type === type && tab.headerEl.classList.contains("active"));
      if (!activeTab) return null;
      return ENTITY_CONFIG[type].getCollection().find(entry => entry.id === activeTab.id) || null;
    }

    function getSelectedTreeEntity(type) {
      if (!selectedTreeItem || selectedTreeItem.getAttribute("data-type") !== type) {
        return null;
      }
      const entityId = parseInt(selectedTreeItem.getAttribute("data-id"), 10);
      return ENTITY_CONFIG[type].getCollection().find(entry => entry.id === entityId) || null;
    }

    function getEntityForExport(type) {
      return getActiveTabEntity(type)
        || getSelectedTreeEntity(type)
        || (ENTITY_CONFIG[type].getCollection().length === 1 ? ENTITY_CONFIG[type].getCollection()[0] : null);
    }

    function getActiveEntity(type) {
      return getActiveTabEntity(type) || getSelectedTreeEntity(type);
    }

    function describeEventForPicker(eventObj) {
      ensureEventDefaults(eventObj);
      const vehicleLabel = vehicles.find(vehicle => `${vehicle.id}` === `${eventObj.spec.vehicleId ?? ""}`)?.name || "No Vehicle";
      const trackLabel = tracks.find(track => `${track.id}` === `${eventObj.spec.trackId ?? ""}`)?.name || "No Track";
      const ambientLabel = `${Number(eventObj.spec.airTemperature ?? 0).toFixed(1)} C, ${Number(eventObj.spec.airPressure ?? 0).toFixed(3)} kPa`;
      return {
        vehicleLabel,
        trackLabel,
        ambientLabel
      };
    }

    function updateSimulateSelectionStatus() {
      const checkboxes = Array.from(document.querySelectorAll('#simulateEventList input[type="checkbox"][data-event-id]'));
      const selectedCount = checkboxes.filter(checkbox => checkbox.checked).length;
      const statusEl = document.getElementById("simulateSelectionStatus");
      const confirmBtn = document.getElementById("simulateConfirm");
      if (statusEl) {
        statusEl.textContent = `${selectedCount} selected`;
      }
      if (confirmBtn) {
        confirmBtn.disabled = selectedCount === 0;
      }
    }

    function renderSimulateEventPicker() {
      const listEl = document.getElementById("simulateEventList");
      if (!listEl) return;
      const activeEvent = getActiveEntity("event");
      const activeEventId = activeEvent?.id ?? null;
      if (eventsArray.length === 0) {
        listEl.innerHTML = '<div class="event-picker-empty">Create or import at least one event before running the solver.</div>';
        updateSimulateSelectionStatus();
        return;
      }

      listEl.innerHTML = eventsArray.map((eventObj) => {
        const details = describeEventForPicker(eventObj);
        const checked = activeEventId === eventObj.id || (activeEventId === null && eventsArray.length === 1);
        return `
          <label class="event-picker-item">
            <input type="checkbox" data-event-id="${eventObj.id}" ${checked ? "checked" : ""}>
            <div>
              <div class="event-picker-name">${eventObj.name || `Event ${eventObj.id}`}</div>
              <div class="event-picker-meta">
                <span>Vehicle: ${details.vehicleLabel}</span>
                <span>Track: ${details.trackLabel}</span>
                <span>Ambient: ${details.ambientLabel}</span>
              </div>
            </div>
          </label>
        `;
      }).join("");

      listEl.querySelectorAll('input[type="checkbox"][data-event-id]').forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          updateSimulateSelectionStatus();
        });
      });
      updateSimulateSelectionStatus();
    }

    function openSimulateEventModal() {
      const overlay = document.getElementById("simulateModalOverlay");
      if (!overlay) return;
      renderSimulateEventPicker();
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeSimulateEventModal() {
      const overlay = document.getElementById("simulateModalOverlay");
      if (!overlay) return;
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
    }

    function getSelectedSimulationEvents() {
      const selectedIds = Array.from(document.querySelectorAll('#simulateEventList input[type="checkbox"][data-event-id]:checked'))
        .map(checkbox => parseInt(checkbox.getAttribute("data-event-id"), 10))
        .filter(Number.isFinite);
      return eventsArray.filter(eventObj => selectedIds.includes(eventObj.id));
    }

    function sendEventsToSolver(selectedEvents) {
      const eventNames = selectedEvents.map(eventObj => eventObj.name || `Event ${eventObj.id}`);
      alert(`Sending ${selectedEvents.length} event(s) to solver:\n${eventNames.join("\n")}`);
    }

    function buildExportFilename(type, entity) {
      const fallbackName = ENTITY_CONFIG[type].exportFile.replace(/\.(xml|json)$/i, "");
      const safeName = `${entity?.name || fallbackName}`
        .trim()
        .replace(/[<>:"/\\|?*\x00-\x1F]+/g, "_")
        .replace(/\s+/g, "_");
      return `${safeName || fallbackName}.json`;
    }

    function buildEntity(type, name) {
      const config = ENTITY_CONFIG[type];
      const entity = { id: allocateEntityId(), name };
      if (config.cloneSpec) {
        entity.spec = config.cloneSpec();
      }
      return entity;
    }

    function createEntity(type, name = null) {
      const config = ENTITY_CONFIG[type];
      const collection = config.getCollection();
      const entityName = name || config.createName(collection.length + 1);
      const entity = buildEntity(type, entityName);
      collection.push(entity);
      addProjectTreeItem(config.branchName, entity.id, entity.name);
      openEditorTab(type, entity.id, entity.name);
      config.syncOpenEditors?.();
      return entity;
    }

    function importEntityFile(type) {
      const config = ENTITY_CONFIG[type];
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json,.xml";
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const fileText = await file.text();
          const trimmed = fileText.trim();
          const entity = trimmed.startsWith("{")
            ? parseEntityJson(type, fileText)
            : parseEntityXml(type, fileText);
          config.getCollection().push(entity);
          addProjectTreeItem(config.branchName, entity.id, entity.name);
          openEditorTab(type, entity.id, entity.name);
          config.syncOpenEditors?.();
          alert(`${config.exportTag} file imported:\n${file.name}`);
        } catch (error) {
          alert(`Unable to import ${config.exportTag.toLowerCase()} file:\n${error.message}`);
        }
      };
      input.click();
    }

    function exportEntityFile(type) {
      const config = ENTITY_CONFIG[type];
      const collection = config.getCollection();
      if (collection.length === 0) {
        alert(`No ${config.branchName.toLowerCase()} to export.`);
        return;
      }
      const entity = getEntityForExport(type);
      if (!entity) {
        alert(`Select or open a ${type} to export.`);
        return;
      }
      const jsonContent = JSON.stringify(buildEntityJson(type, entity), null, 2);
      downloadFile(jsonContent, buildExportFilename(type, entity), "application/json");
    }

    /**
     * Helper to trigger a file download
     */
    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function initProjectTree() {
      const tree = document.getElementById("project-tree");
      const ul = document.createElement("ul");
      tree.appendChild(ul);

      // 1) Vehicles
      ul.appendChild(createCollapsibleBranch("Vehicles"));
      // 2) Tracks

    function createCollapsibleBranch(branchName) {
      const branchLi = document.createElement("li");
      branchLi.className = "collapsible-branch";

      const arrowSpan = document.createElement("span");
      arrowSpan.className = "toggle-arrow";
      arrowSpan.textContent = "▾";

      const titleSpan = document.createElement("span");
      titleSpan.textContent = branchName;
      titleSpan.style.marginLeft = "5px";

      const subUl = document.createElement("ul");
      subUl.setAttribute("data-branch-name", branchName);
      subUl.style.display = "block";

      // Toggle
      arrowSpan.addEventListener("click", () => {
        const isHidden = subUl.style.display === "none";
        subUl.style.display = isHidden ? "block" : "none";
        arrowSpan.textContent = isHidden ? "▾" : "▸";
      });

      branchLi.appendChild(arrowSpan);
      branchLi.appendChild(titleSpan);
      branchLi.appendChild(subUl);
      return branchLi;
    }

    function addProjectTreeItem(branchName, itemId, itemLabel) {
      const branchUl = document.querySelector(`ul[data-branch-name="${branchName}"]`);
      if (!branchUl) return;

      const itemLi = document.createElement("li");
      itemLi.setAttribute("data-id", itemId);
      // e.g. "Vehicles" -> "vehicle", "Tracks" -> "track", etc.
      itemLi.setAttribute("data-type", branchName.slice(0, -1).toLowerCase());
      itemLi.textContent = itemLabel;

      // Single click: open the tab
      itemLi.addEventListener("click", () => {
        setSelectedTreeItem(itemLi);
        openEditorTab(itemLi.getAttribute("data-type"), itemId, itemLi.textContent);
      });

      branchUl.appendChild(itemLi);
    }

    function renderFormField(field, id) {
      const attrs = [];
      if (field.type && field.type !== "select") attrs.push(`type="${field.type}"`);
      if (field.step !== undefined) attrs.push(`step="${field.step}"`);
      if (field.min !== undefined) attrs.push(`min="${field.min}"`);
      if (field.max !== undefined) attrs.push(`max="${field.max}"`);
      const inputId = `${field.key}-${id}`;
      const controlHtml = field.type === "select"
        ? `<select id="${inputId}">${(field.options || []).map(option => `<option value="${option.value}">${option.label}</option>`).join("")}</select>`
        : `<input ${attrs.join(" ")} id="${inputId}" />`;

      return `
        <div class="form-group">
          <label for="${inputId}">${field.label}</label>
          ${controlHtml}
        </div>
      `;
    }

    function openEditorTab(type, id, label) {
      const existing = tabs.find(t => t.type === type && t.id === id);
      if (existing) {
        setActiveTab(existing.tabId);
        return;
      }

      const tabId = `tab-${currentTabId++}`;
      const tabHeaders = document.querySelector(".tab-headers");
      const tabContent = document.querySelector(".tab-content");

      const headerEl = document.createElement("div");
      headerEl.className = "tab-header";
      headerEl.setAttribute("data-tab-id", tabId);
      headerEl.innerHTML = `<span>${label}</span><span class="close-btn">x</span>`;

      const contentEl = document.createElement("div");
      contentEl.className = "tab-panel";
      contentEl.setAttribute("data-tab-id", tabId);

      const editorConfig = editorRegistry[type];
      contentEl.innerHTML = editorConfig ? editorConfig.render(id, label) : renderDefaultEditor(type, id, label);
      if (editorConfig?.init) {
        editorConfig.init(tabId, id, label, headerEl);
      }


      // Close tab
      headerEl.querySelector(".close-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        closeTab(tabId);
      });

      // Activate tab on header click
      headerEl.addEventListener("click", () => {
        setActiveTab(tabId);
      });

      tabHeaders.appendChild(headerEl);
      tabContent.appendChild(contentEl);

      tabs.push({ tabId, type, id, headerEl, contentEl });
      setActiveTab(tabId);
    }

    function attachPowertrainClipboard(tableBody, vehicle) {
      let activeRow = 0;
      let activeCol = 0;

      tableBody.addEventListener("focusin", (e) => {
        const cell = e.target.closest(".powertrain-cell");
        if (!cell) return;
        activeRow = parseInt(cell.dataset.row, 10) || 0;
        activeCol = parseInt(cell.dataset.col, 10) || 0;
      });

      tableBody.addEventListener("paste", (e) => {
        const cell = e.target.closest(".powertrain-cell");
        if (!cell) return;
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text");
        const rows = text.split(/\r?\n/).filter(r => r.length > 0);
        rows.forEach((rowText, rIdx) => {
          const cols = rowText.split(/\t/);
          cols.forEach((val, cIdx) => {
            const target = tableBody.querySelector(`.powertrain-cell[data-row="${activeRow + rIdx}"][data-col="${activeCol + cIdx}"]`);
            if (target) {
              target.textContent = val.trim();
              updateEngineSpec(vehicle, activeRow + rIdx, activeCol + cIdx, val.trim());
            }
          });
        });
      });

      tableBody.addEventListener("keydown", (e) => {
        const cell = e.target.closest(".powertrain-cell");
        if (!cell) return;
        if (e.key === "Enter") {
          e.preventDefault();
          const row = parseInt(cell.dataset.row, 10) || 0;
          const col = parseInt(cell.dataset.col, 10) || 0;
          const nextCol = col === 0 ? 1 : 0;
          const nextRow = col === 0 ? row : row + 1;
          const nextCell = tableBody.querySelector(`.powertrain-cell[data-row="${nextRow}"][data-col="${nextCol}"]`);
          if (nextCell) {
            nextCell.focus();
            placeCaretAtEnd(nextCell);
          }
        }
      });

      tableBody.addEventListener("input", (e) => {
        const cell = e.target.closest(".powertrain-cell");
        if (!cell) return;
        const sanitized = cell.textContent.replace(/\r?\n/g, " ");
        if (sanitized !== cell.textContent) {
          cell.textContent = sanitized;
          placeCaretAtEnd(cell);
        }
        updateEngineSpec(vehicle, parseInt(cell.dataset.row, 10) || 0, parseInt(cell.dataset.col, 10) || 0, sanitized);
      });
    }

    function placeCaretAtEnd(el) {
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
